// ========== UTILS ==========
async function hashPw(pw) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function isAdminOrSuper() { return currentUser && (currentUser.role==='admin'||currentUser.role==='superadmin'); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtTime(ts) {
  if (!ts) return '-';
  const d = typeof ts==='string' ? new Date(ts) : (ts.seconds ? new Date(ts.seconds*1000) : new Date(ts));
  return d.toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}
function genId() { return 'u_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

function showToast(msg, type='success') {
  const t=document.getElementById('toast'), m=document.getElementById('toast-msg');
  if(!t||!m) return;
  m.textContent=msg;
  t.className='fixed bottom-6 left-1/2 -translate-x-1/2 z-[200] flex items-center gap-2 text-white px-5 py-3 rounded-2xl shadow-2xl text-sm font-semibold pointer-events-none transition-all duration-300 '+(type==='success'?'bg-emerald-600':type==='error'?'bg-red-600':'bg-blue-600');
  t.style.opacity='1'; t.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(t._t);
  t._t=setTimeout(()=>{t.style.opacity='0'; t.style.transform='translateX(-50%) translateY(16px)';},3000);
}

// ========== AUTH ==========
async function loginUser(username, password) {
  const hash = await hashPw(password);
  if (IS_DEMO) {
    const u = DEMO_USERS.find(x=>x.username===username && x.passwordHash===hash && x.isActive);
    if (!u) { addLoginLogDemo(null,username,'failed'); throw new Error('아이디 또는 비밀번호가 올바르지 않습니다.'); }
    addLoginLogDemo(u.id,username,'login',u.displayName);
    return {id:u.id,username:u.username,displayName:u.displayName,role:u.role,allowedTeams:u.allowedTeams};
  }
  const q=query(collection(db,'users'),where('username','==',username),where('isActive','==',true));
  const snap=await getDocs(q);
  if(snap.empty){ addLoginLog(null,username,'failed'); throw new Error('아이디 또는 비밀번호가 올바르지 않습니다.'); }
  const d=snap.docs[0]; const ud=d.data();
  if(ud.passwordHash!==hash){ addLoginLog(d.id,username,'failed'); throw new Error('아이디 또는 비밀번호가 올바르지 않습니다.'); }
  addLoginLog(d.id,username,'login',ud.displayName);
  return {id:d.id,username:ud.username,displayName:ud.displayName,role:ud.role,allowedTeams:ud.allowedTeams||[]};
}
async function doLogout() {
  if(currentUser) IS_DEMO?addLoginLogDemo(currentUser.id,currentUser.username,'logout',currentUser.displayName):addLoginLog(currentUser.id,currentUser.username,'logout',currentUser.displayName);
  sessionStorage.removeItem('ys_session');
  currentUser=null;
  showToast('로그아웃되었습니다.','info');
  setTimeout(()=>showModal('login-modal'),400);
}

// ========== USER CRUD ==========
async function createUser({username,displayName,password,role,allowedTeams,isActive}) {
  const hash=await hashPw(password);
  if(IS_DEMO) {
    if(DEMO_USERS.find(u=>u.username===username)) throw new Error('이미 사용 중인 아이디입니다.');
    const u={id:genId(),username,displayName,passwordHash:hash,role,allowedTeams,isActive,createdAt:new Date().toISOString(),createdBy:currentUser.displayName};
    DEMO_USERS.push(u);
    await addActivityLog('사용자_생성',username,null,{role,allowedTeams});
    return;
  }
  const q=query(collection(db,'users'),where('username','==',username));
  if(!(await getDocs(q)).empty) throw new Error('이미 사용 중인 아이디입니다.');
  const ref=doc(collection(db,'users'));
  await setDoc(ref,{username,displayName,passwordHash:hash,role,allowedTeams,isActive,createdAt:serverTimestamp(),createdBy:currentUser.displayName});
  await addActivityLog('사용자_생성',username,null,{role,allowedTeams});
}
async function updateUser(id,{displayName,password,role,allowedTeams,isActive},oldData) {
  if(IS_DEMO) {
    const u=DEMO_USERS.find(x=>x.id===id);
    if(!u) throw new Error('사용자 없음');
    const prev={...u};
    u.displayName=displayName; u.role=role; u.allowedTeams=allowedTeams; u.isActive=isActive;
    if(password) u.passwordHash=await hashPw(password);
    await addActivityLog('사용자_수정',u.username,prev,{displayName,role,allowedTeams,isActive});
    return;
  }
  const upd={displayName,role,allowedTeams,isActive,updatedAt:serverTimestamp()};
  if(password) upd.passwordHash=await hashPw(password);
  await updateDoc(doc(db,'users',id),upd);
  await addActivityLog('사용자_수정',oldData.username,oldData,{displayName,role,allowedTeams,isActive});
}
async function deleteUser(id,username) {
  if(IS_DEMO){ DEMO_USERS=DEMO_USERS.filter(u=>u.id!==id); await addActivityLog('사용자_삭제',username,null,null); return; }
  await deleteDoc(doc(db,'users',id));
  await addActivityLog('사용자_삭제',username,null,null);
}

  await updateDoc(doc(db,'teams',id),{...data,updatedAt:serverTimestamp()});
  await addActivityLog('활동단_수정',data.name,old,data);
}

  };
}

// ========== RENDER: TABS ==========
function setActiveTab(tab) {
  activeTab=tab;
  document.querySelectorAll('[data-tab]').forEach(el=>{
    const isActive=el.dataset.tab===tab;
    el.classList.toggle('bg-slate-800',isActive);
    el.classList.toggle('text-white',isActive);
    el.classList.toggle('text-slate-400',!isActive);
    el.classList.toggle('hover:bg-slate-700',!isActive);
    el.classList.toggle('hover:text-white',!isActive);
  });
  document.querySelectorAll('[data-panel]').forEach(el=>{
    el.classList.toggle('hidden',el.dataset.panel!==tab);
  });
  renderTab(tab);
}

async function renderTab(tab) {
  if(tab==='dashboard') await renderDashboard();
  else if(tab==='users') await renderUsers();
  else if(tab==='teams') renderTeams();
  else if(tab==='login-logs') await renderLoginLogs(logPage.login);
  else if(tab==='activity-logs') await renderActivityLogs(logPage.activity);
  else if(tab==='archive') await renderArchive();
}

                <td class="px-4 py-3"><span class="px-2 py-0.5 text-[10px] font-bold rounded-full ${ACTION_STYLE[l.action]||'bg-slate-100 text-slate-600'}">${l.action==='login'?'✓ 로그인':l.action==='logout'?'← 로그아웃':'✗ 실패'}</span></td>

window.loadArchivePanel = async function(weekId) {
  const c=document.getElementById('archive-content');
  if(!weekId||!c) return;
  c.innerHTML=`<div class="text-center py-12"><div class="w-8 h-8 border-4 border-slate-200 border-t-violet-500 rounded-full animate-spin mx-auto mb-3"></div></div>`;
  if(IS_DEMO){c.innerHTML=`<div class="text-center py-12 text-slate-400 text-sm">데모 모드에서는 과거 기록이 없습니다</div>`;return;}
  try{
    const snap=await getDoc(doc(db,'archive',weekId));
    if(!snap.exists()){c.innerHTML=`<div class="text-center py-12 text-slate-400 text-sm">기록을 찾을 수 없습니다</div>`;return;}
    const data=snap.data().data;
    let html=`<div class="flex justify-end mb-3"><button onclick="exportArchiveExcel('${esc(weekId)}')" class="flex items-center gap-1.5 text-xs font-semibold text-emerald-700 bg-emerald-50 border border-emerald-200 px-3 py-1.5 rounded-lg hover:bg-emerald-100 transition-all"><i data-lucide="download" class="w-3.5 h-3.5"></i> 엑셀 저장</button></div>`;
    DAYS.forEach(day=>{
      const dd=data[day.id]||{};
      const cnt=Object.keys(dd).length;
      html+=`<div class="mb-6"><h4 class="text-xs font-bold text-slate-600 mb-2">${day.label} <span class="font-normal text-slate-400">(${cnt}건)</span></h4>`;
      if(cnt>0){
        html+=`<div class="overflow-x-auto"><table class="border-collapse text-[10px]" style="min-width:800px"><thead><tr class="bg-slate-50 border border-slate-200"><th class="px-2 py-1.5 border border-slate-200 font-bold text-slate-500 w-14">시간</th>${ALL_ROOMS.map(r=>`<th class="px-2 py-1.5 border border-slate-200 font-bold text-slate-600 min-w-[80px]">${esc(r)}</th>`).join('')}</tr></thead><tbody>`;
        HOURS.forEach(h=>{
          html+=`<tr><td class="px-2 py-1.5 border border-slate-200 font-bold text-slate-500 bg-slate-50 text-center">${h}</td>`;
          ALL_ROOMS.forEach(r=>{
            const res=dd[`${h}-${r}`];
            if(res){const t=getTeam(res.teamId);html+=`<td class="px-2 py-1.5 border border-slate-200"><span class="px-1.5 py-0.5 rounded text-[9px] font-bold ${t?`${t.bg} ${t.text}`:'bg-slate-100 text-slate-600'}">${esc(res.teamName)}</span></td>`;}
            else html+=`<td class="px-2 py-1.5 border border-slate-100 text-slate-200 text-center">·</td>`;
          });
          html+=`</tr>`;
        });
        html+=`</tbody></table></div>`;
      }
      html+=`</div>`;
    });
    c.innerHTML=html; lucide.createIcons();
  }catch(e){c.innerHTML=`<div class="text-center py-12 text-red-400 text-sm">${esc(e.message)}</div>`;}
};

window.exportArchiveExcel = async function(weekId) {
  if(IS_DEMO){showToast('데모 모드에서는 지원되지 않습니다','error');return;}
  showToast('엑셀 준비 중...','info');
  try{
    const snap=await getDoc(doc(db,'archive',weekId));
    if(!snap.exists()){showToast('데이터 없음','error');return;}
    const data=snap.data().data;
    const wb=XLSX.utils.book_new();
    DAYS.forEach(day=>{
      const dd=data[day.id]||{};
      const rows=[['시간',...ALL_ROOMS]];
      HOURS.forEach(h=>rows.push([h,...ALL_ROOMS.map(r=>{const res=dd[`${h}-${r}`];return res?`${res.teamName}${res.isFixed?' (고정)':''}`:'';})]));
      const ws=XLSX.utils.aoa_to_sheet(rows);
      ws['!cols']=[{wch:8},...ALL_ROOMS.map(()=>({wch:14}))];
      XLSX.utils.book_append_sheet(wb,ws,day.label);
    });
    XLSX.writeFile(wb,`유스나루_${weekId}.xlsx`);
    showToast('엑셀 다운로드 완료!','success');
  }catch(e){showToast('실패: '+e.message,'error');}
};

// ========== INIT ==========
async function initApp() {
  await initDemoUsers();
  fetchIP();

  // Session restore
  const saved=sessionStorage.getItem('ys_session');
  if(saved){
    try{ currentUser=JSON.parse(saved); }catch{ sessionStorage.removeItem('ys_session'); }
  }

  // Check permission
  if(!currentUser || !isAdminOrSuper()) {
    showModal('login-modal');
    updateHeader();
    return;
  }

  await loadTeams();
  updateHeader();
  setActiveTab('dashboard');

  if(IS_DEMO) document.getElementById('demo-banner')?.classList.remove('hidden');
  document.getElementById('close-demo-banner')?.addEventListener('click',()=>document.getElementById('demo-banner')?.remove());

  // Tab nav
  document.querySelectorAll('[data-tab]').forEach(btn=>{
    btn.addEventListener('click',()=>setActiveTab(btn.dataset.tab));
  });

  // Logout
  document.getElementById('logout-btn')?.addEventListener('click', doLogout);

  // Login form
  document.getElementById('login-form')?.addEventListener('submit', async e=>{
    e.preventDefault();
    const un=document.getElementById('login-username').value.trim();
    const pw=document.getElementById('login-password').value;
    const errEl=document.getElementById('login-error');
    const btn=document.getElementById('login-submit-btn');
    errEl.classList.add('hidden');
    btn.disabled=true; btn.textContent='로그인 중...';
    try{
      const user=await loginUser(un,pw);
      if(!isAdminOrSuper.call({role:user.role})){
        errEl.textContent='관리자 권한이 없습니다. 일반 사용자는 index.html을 이용하세요.';
        errEl.classList.remove('hidden'); btn.disabled=false; btn.textContent='로그인'; return;
      }
      currentUser=user; sessionStorage.setItem('ys_session',JSON.stringify(user));
      hideModal('login-modal');
      await loadTeams(); updateHeader(); setActiveTab('dashboard');
      if(IS_DEMO) document.getElementById('demo-banner')?.classList.remove('hidden');
    }catch(err){ errEl.textContent=err.message; errEl.classList.remove('hidden'); }
    finally{ btn.disabled=false; btn.textContent='로그인'; }
  });

  // User modal form
  document.getElementById('user-form')?.addEventListener('submit', async e=>{
    e.preventDefault();
    const btn=e.target.querySelector('[type=submit]');
    btn.disabled=true; btn.textContent='저장 중...';
    try{
      const uid=document.getElementById('user-id-field').value;
      const isEdit=!!uid;
      const username=document.getElementById('user-username').value.trim();
      const displayName=document.getElementById('user-displayname').value.trim();
      const password=document.getElementById('user-password').value;
      const role=document.getElementById('user-role').value;
      const isActive=document.getElementById('user-is-active').checked;
      const allowedTeams=Array.from(document.querySelectorAll('[name=allowedTeams]:checked')).map(c=>c.value);
      if(!displayName||((!isEdit)&&!password)) throw new Error('필수 항목을 모두 입력해주세요.');
      if(isEdit){
        const users=await loadUsers(); const old=users.find(u=>u.id===uid);
        await updateUser(uid,{displayName,password,role,allowedTeams,isActive},old);
        showToast('사용자가 수정되었습니다.','success');
      } else {
        await createUser({username,displayName,password,role,allowedTeams,isActive});
        showToast('사용자가 추가되었습니다.','success');
      }
      hideModal('user-modal'); await renderUsers();
    }catch(err){showToast(err.message,'error');}
    finally{btn.disabled=false; btn.textContent='저장';}
  });

  // Role change → toggle team checkboxes
  document.getElementById('user-role')?.addEventListener('change', e=>{
    const tc=document.getElementById('user-teams-section');
    if(tc) tc.classList.toggle('hidden', e.target.value!=='user');
  });

  // Team modal form
  document.getElementById('team-form')?.addEventListener('submit', async e=>{
    e.preventDefault();
    const btn=e.target.querySelector('[type=submit]');
    btn.disabled=true; btn.textContent='저장 중...';
    try{
      const tid=document.getElementById('team-id-field').value;
      const isEdit=!!tid;
      const id=isEdit?tid:document.getElementById('team-id').value.trim();
      const name=document.getElementById('team-name').value.trim();
      const fullType=document.getElementById('team-fulltype').value.trim();
      const schedule=document.getElementById('team-schedule').value.trim();
      const typicalRooms=document.getElementById('team-rooms').value.split(',').map(s=>s.trim()).filter(Boolean);
      const colorKey=document.getElementById('team-color').value;
      const col=COLOR_OPTIONS.find(c=>c.key===colorKey)||COLOR_OPTIONS[0];
      if(!id||!name) throw new Error('ID와 이름은 필수입니다.');
      const data={id,name,fullType,schedule,typicalRooms,bg:col.bg,text:col.text,border:col.border};
      if(isEdit){ const old=TEAMS.find(t=>t.id===tid); await updateTeam(tid,data,old); showToast('활동단이 수정되었습니다.','success'); }
      else{ await createTeam(data); showToast('활동단이 추가되었습니다.','success'); }
      hideModal('team-modal'); renderTeams();
    }catch(err){showToast(err.message,'error');}
    finally{btn.disabled=false; btn.textContent='저장';}
  });

  // Close modals
  document.getElementById('close-user-modal')?.addEventListener('click',()=>hideModal('user-modal'));
  document.getElementById('close-team-modal')?.addEventListener('click',()=>hideModal('team-modal'));
}

function updateHeader() {
  const el=document.getElementById('header-user');
  if(!el) return;
  if(!currentUser){ el.innerHTML=''; return; }
  const roleLabel={superadmin:'👑 주관리자',admin:'🔧 관리자',user:'👤'}[currentUser.role]||'';
  el.innerHTML=`<div class="flex items-center gap-2">
    <div class="text-right hidden sm:block"><div class="text-xs font-bold text-slate-700">${esc(currentUser.displayName)}</div><div class="text-[10px] text-slate-400">${roleLabel}</div></div>
    <div class="bg-gradient-to-br from-teal-400 to-teal-600 text-white rounded-full w-8 h-8 flex items-center justify-center text-sm font-bold">${esc(currentUser.displayName[0])}</div>
    <button id="logout-btn" class="ml-1 text-slate-400 hover:text-red-500 transition-colors p-1.5 rounded-lg hover:bg-red-50"><i data-lucide="log-out" class="w-4 h-4"></i></button>
  </div>`;
  document.getElementById('logout-btn')?.addEventListener('click', doLogout);
  lucide.createIcons();
}

// Helper for isAdminOrSuper check in login
function isAdminOrSuperForRole(role){ return role==='admin'||role==='superadmin'; }

window.addEventListener('DOMContentLoaded', initApp);
</script>

        <div id="login-error" class="hidden bg-red-50 border border-red-200 text-red-600 text-xs px-3 py-2 rounded-xl"></div>
        <div class="bg-slate-50 border border-slate-100 rounded-xl p-3 text-[10px] text-slate-500">
          <p class="font-semibold mb-1 text-slate-600">데모 계정</p>
          <p><code class="bg-slate-200 px-1 rounded">admin / youthnaroo2026!</code> (주관리자)</p>
          <p class="mt-0.5"><code class="bg-slate-200 px-1 rounded">manager1 / mgr123</code> (관리자)</p>
        </div>
        <button id="login-submit-btn" type="submit"
          class="w-full bg-gradient-to-r from-slate-700 to-slate-800 hover:from-slate-800 hover:to-slate-900 text-white font-bold py-3 rounded-xl transition-all text-sm">
          로그인
        </button>
        <a href="index.html" class="text-center text-xs text-slate-400 hover:text-teal-600 transition-colors">← 일반 예약 페이지로</a>
      </form>
    </div>
  </div>
</div>

<!-- ===== USER MODAL ===== -->
<div id="user-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md border border-slate-200 max-h-[90vh] overflow-y-auto">
    <div class="flex items-center justify-between p-5 border-b border-slate-100">
      <div class="flex items-center gap-3">
        <div class="bg-teal-100 text-teal-600 p-2 rounded-xl"><i data-lucide="user-plus" class="w-4 h-4"></i></div>
        <h2 id="user-modal-title" class="font-bold text-slate-800">사용자 추가</h2>
      </div>
      <button id="close-user-modal" class="text-slate-400 hover:text-slate-600 p-1 rounded-lg hover:bg-slate-100">
        <i data-lucide="x" class="w-5 h-5"></i>
      </button>
    </div>
    <form id="user-form" class="p-5 flex flex-col gap-4">
      <input type="hidden" id="user-id-field">
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1.5">아이디 <span class="text-red-400">*</span></label>
          <input id="user-username" type="text" required placeholder="영문/숫자"
            class="w-full px-3 py-2 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-400 placeholder-slate-300 disabled:bg-slate-50 disabled:text-slate-400">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1.5">이름 <span class="text-red-400">*</span></label>
          <input id="user-displayname" type="text" required placeholder="표시 이름"
            class="w-full px-3 py-2 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-400 placeholder-slate-300">
        </div>
      </div>
      <div>
        <label class="block text-xs font-semibold text-slate-600 mb-1.5">비밀번호</label>
        <input id="user-password" type="password" placeholder="비밀번호"
          class="w-full px-3 py-2 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-400 placeholder-slate-300">
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1.5">역할</label>
          <select id="user-role" class="w-full px-3 py-2 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-400 bg-white">
            <option value="user">👤 일반사용자</option>
            <option value="admin">🔧 관리자</option>
            <option value="superadmin" id="superadmin-opt">👑 주관리자</option>
          </select>
        </div>
        <div class="flex items-end pb-2">
          <label class="flex items-center gap-2 cursor-pointer">
            <input id="user-is-active" type="checkbox" checked class="rounded accent-teal-600 w-4 h-4">
            <span class="text-sm font-semibold text-slate-700">활성 계정</span>
          </label>
        </div>
      </div>
      <div id="user-teams-section">
        <label class="block text-xs font-semibold text-slate-600 mb-2">활동단 권한 <span class="text-slate-400 font-normal">(일반사용자 한정)</span></label>
        <div id="user-teams-cb" class="grid grid-cols-2 gap-1 max-h-48 overflow-y-auto p-1 border border-slate-100 rounded-xl bg-slate-50"></div>
      </div>
      <button type="submit" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-2.5 rounded-xl transition-all text-sm shadow-sm">저장</button>
    </form>
  </div>
</div>

<!-- ===== TEAM MODAL ===== -->
<div id="team-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md border border-slate-200">
    <div class="flex items-center justify-between p-5 border-b border-slate-100">
      <div class="flex items-center gap-3">
        <div class="bg-indigo-100 text-indigo-600 p-2 rounded-xl"><i data-lucide="flag" class="w-4 h-4"></i></div>
        <h2 id="team-modal-title" class="font-bold text-slate-800">활동단 추가</h2>
      </div>
      <button id="close-team-modal" class="text-slate-400 hover:text-slate-600 p-1 rounded-lg hover:bg-slate-100">
        <i data-lucide="x" class="w-5 h-5"></i>
      </button>
    </div>
    <form id="team-form" class="p-5 flex flex-col gap-3">
      <input type="hidden" id="team-id-field">
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1.5">ID <span class="text-red-400">*</span></label>
          <input id="team-id" type="text" required placeholder="영문 소문자" class="w-full px-3 py-2 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 placeholder-slate-300 disabled:bg-slate-50 disabled:text-slate-400">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1.5">활동단명 <span class="text-red-400">*</span></label>
          <input id="team-name" type="text" required placeholder="이름" class="w-full px-3 py-2 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 placeholder-slate-300">
        </div>
      </div>
      <div>
        <label class="block text-xs font-semibold text-slate-600 mb-1.5">정식명칭</label>
        <input id="team-fulltype" type="text" placeholder="예: 청소년운영위원회" class="w-full px-3 py-2 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 placeholder-slate-300">
      </div>
      <div>
        <label class="block text-xs font-semibold text-slate-600 mb-1.5">정기 일정</label>
        <input id="team-schedule" type="text" placeholder="예: 2,4주 토요일 14:00~17:00" class="w-full px-3 py-2 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 placeholder-slate-300">
      </div>
      <div>
        <label class="block text-xs font-semibold text-slate-600 mb-1.5">주요 공간 <span class="text-slate-400 font-normal">(쉼표 구분)</span></label>
        <input id="team-rooms" type="text" placeholder="예: 나루지기실, 링키실" class="w-full px-3 py-2 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 placeholder-slate-300">
      </div>
      <div>
        <label class="block text-xs font-semibold text-slate-600 mb-1.5">색상</label>
        <select id="team-color" class="w-full px-3 py-2 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white"></select>
      </div>
      <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-xl transition-all text-sm shadow-sm mt-1">저장</button>
    </form>
  </div>
</div>

</body>
</html>
