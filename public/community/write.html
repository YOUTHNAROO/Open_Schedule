<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>새 글 쓰기 · 유스나루</title>
<link rel="stylesheet" href="assets/everytime.css?v=9" />
<script src="../env.js"></script>
<style>
  .write-body{flex:1;overflow-y:auto;padding:14px 16px 120px;display:flex;flex-direction:column;gap:14px}
  .title-wrap{padding:4px 2px;border-bottom:1px solid var(--line)}
  .area-wrap{padding:4px 2px;min-height:160px}
  .field-area{min-height:150px}
  .photos{display:flex;gap:9px;overflow-x:auto;padding:2px;scrollbar-width:none}
  .photos::-webkit-scrollbar{display:none}
  .add-photo{flex:0 0 auto;width:84px;height:84px;border-radius:14px;border:1.5px dashed var(--border);background:var(--secondary);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--muted);cursor:pointer}
  .add-photo svg{width:22px;height:22px}
  .add-photo .c{font-size:11px;font-weight:700}
  .thumb{flex:0 0 auto;width:84px;height:84px;border-radius:14px;position:relative;overflow:hidden;background:linear-gradient(135deg,#dfe3ec,#eef1f6)}
  .thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .thumb .rm{position:absolute;top:5px;right:5px;width:22px;height:22px;border-radius:50%;background:rgba(15,23,42,.7);border:0;color:#fff;display:grid;place-items:center;cursor:pointer;z-index:2}
  .thumb .rm svg{width:13px;height:13px}
  .thumb .cover{position:absolute;left:5px;bottom:5px;font-size:9px;font-weight:800;background:var(--primary);color:#fff;padding:2px 6px;border-radius:5px;z-index:2}
  .tip{font-size:12px;color:var(--faint);display:flex;align-items:center;gap:6px}
  .tip svg{width:14px;height:14px;flex:0 0 auto}
  .compose-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:var(--maxw);background:rgba(255,255,255,.95);backdrop-filter:blur(14px);border-top:1px solid var(--border);display:flex;align-items:center;gap:6px;padding:10px 12px max(10px,env(safe-area-inset-bottom));z-index:40}
  .tool{display:flex;align-items:center;gap:6px;border:0;background:var(--secondary);color:var(--muted);border-radius:11px;padding:9px 13px;font-size:13px;font-weight:700;cursor:pointer}
  .tool svg{width:18px;height:18px}
  .tool.on{background:var(--anon-bg);color:var(--anon)}
  .counter{margin-left:auto;font-size:12px;color:var(--faint);font-weight:600;font-variant-numeric:tabular-nums}
</style>
</head>
<body>
<div class="app" data-od-id="write">
  <header class="pagehead">
    <a class="back-btn" href="home.html" aria-label="취소"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></a>
    <span class="title">새 글 쓰기</span>
    <span class="spacer"></span>
    <button class="text-btn primary" id="submitBtn" disabled>게시</button>
  </header>

  <main class="write-body">
    <button class="selector" id="boardSelector">
      <span class="lab">게시판</span>
      <span class="val" id="boardVal">자유게시판 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg></span>
    </button>

    <div class="anon-row on" id="anonRow">
      <span class="ai" id="anonIcon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C7 2 4 6 4 11c0 3 2 5 4 6 0 2 2 5 4 5s4-3 4-5c2-1 4-3 4-6 0-5-3-9-8-9Z"/></svg></span>
      <div class="txt"><b id="anonTitle">익명으로 작성 중</b><span id="anonSub">동아리·이름이 노출되지 않아요</span></div>
      <button class="switch on" id="anonSwitch" aria-label="익명 전환"></button>
    </div>
    <div class="anon-hint" id="anonHint"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/></svg><span>안전한 익명 글쓰기가 활성화되었습니다</span></div>

    <div class="title-wrap">
      <input class="field-input" id="titleInput" type="text" placeholder="제목" maxlength="60" />
    </div>

    <div class="area-wrap">
      <textarea class="field-area" id="bodyInput" placeholder="자유롭게 이야기를 적어보세요.&#10;서로를 존중하는 대화를 부탁드려요." maxlength="1000"></textarea>
    </div>

    <input type="file" id="fileInput" accept="image/*" multiple hidden />
    <div class="photos" id="photos">
      <button class="add-photo" id="addPhoto">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="6" width="18" height="14" rx="3"/><circle cx="12" cy="13" r="3.2"/><path d="M8 6 9.3 3.8h5.4L16 6"/></svg>
        <span class="c" id="photoCount">0/10</span>
      </button>
    </div>
    <div class="tip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/></svg>사진은 최대 10장까지 · 첫 장이 대표 이미지로 표시돼요</div>
  </main>

  <div class="compose-bar">
    <button class="tool" id="photoTool"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="6" width="18" height="14" rx="3"/><circle cx="12" cy="13" r="3.5"/></svg>사진</button>
    <button class="tool on" id="anonTool"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C7 2 4 6 4 11c0 3 2 5 4 6 0 2 2 5 4 5s4-3 4-5c2-1 4-3 4-6 0-5-3-9-8-9Z"/></svg><span id="anonToolLabel">익명</span></button>
    <span class="counter"><span id="bodyLen">0</span> / 1000</span>
  </div>
</div>

<div class="sheet-wrap" id="boardSheet">
  <div class="sheet-bg" id="boardSheetBg"></div>
  <div class="sheet">
    <div class="grab"></div>
    <h4>게시판 선택</h4>
    <div id="boardList">
      <button class="opt sel" data-board="free"><span class="oi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 10h8M8 14h5M21 12a9 9 0 1 1-3.5-7.1L21 4v5h-5"/></svg></span><span class="ot"><b>자유게시판</b><span>무엇이든 자유롭게</span></span><span class="check"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m5 13 4 4L19 7"/></svg></span></button>
      <button class="opt" data-board="secret"><span class="oi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg></span><span class="ot"><b>비밀게시판</b><span>익명 전용 · 더 솔직하게</span></span><span class="check"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m5 13 4 4L19 7"/></svg></span></button>
      <button class="opt" data-board="info"><span class="oi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/></svg></span><span class="ot"><b>정보게시판</b><span>꿀팁·공지·자료 공유</span></span><span class="check"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m5 13 4 4L19 7"/></svg></span></button>
      <button class="opt" data-board="review"><span class="oi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m12 3 2.9 5.9 6.6 1-4.8 4.6 1.1 6.5L12 18l-5.8 3 1.1-6.5L2.5 9.9l6.6-1L12 3Z"/></svg></span><span class="ot"><b>강의·활동 리뷰</b><span>별점·후기 아카이브</span></span><span class="check"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m5 13 4 4L19 7"/></svg></span></button>
      <button class="opt" data-board="meetup"><span class="oi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2 4 14h7l-1 8 9-12h-7l1-8Z"/></svg></span><span class="ot"><b>공강 번개</b><span>지금 시간 비는 사람 모집</span></span><span class="check"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m5 13 4 4L19 7"/></svg></span></button>
      <button class="opt" data-board="flex"><span class="oi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg></span><span class="ot"><b>시간표 자랑</b><span>이번 시즌 시간표 공유</span></span><span class="check"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m5 13 4 4L19 7"/></svg></span></button>
    </div>
  </div>
</div>

<div class="modal-wrap" id="confirmModal">
  <div class="modal-bg" id="confirmBg"></div>
  <div class="modal">
    <div class="mi" id="modalIcon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C7 2 4 6 4 11c0 3 2 5 4 6 0 2 2 5 4 5s4-3 4-5c2-1 4-3 4-6 0-5-3-9-8-9Z"/></svg></div>
    <h4 id="modalTitle">익명으로 업로드</h4>
    <p id="modalMsg">현재 <b>익명</b> 상태로 업로드됩니다. 작성자 정보는 다른 사용자에게 노출되지 않아요. 계속하시겠습니까?</p>
    <div class="modal-actions">
      <button class="btn ghost" style="flex:1" id="confirmCancel">다시 확인</button>
      <button class="btn primary" style="flex:1" id="confirmPublish">게시하기</button>
    </div>
  </div>
</div>

<script type="module">
  import { requireLoginOrRedirect, createPost, loadBoards, boardName, isAnonOnly, boardExists, boardFeature, canAccessBoard } from './community-data.js?v=9';
  import { toast, esc, mountOnlineBadge } from './community-ui.js?v=9';

  const me = await requireLoginOrRedirect();
  mountOnlineBadge();

  const $ = id => document.getElementById(id);
  const CHEVRON = ' <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>';

  // 접근 가능한 게시판만 선택지로 구성(기존 하드코딩 옵션 대체)
  const all = await loadBoards();
  const ICONP = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 10h8M8 14h5M21 12a9 9 0 1 1-3.5-7.1L21 4v5h-5"/></svg>';
  const accessible = all.filter(b => canAccessBoard(b, me)).sort((a, b) => (a.order ?? 999) - (b.order ?? 999));
  $('boardList').innerHTML = accessible.map(b =>
    `<button class="opt" data-board="${esc(b.id)}"><span class="oi">${ICONP}</span><span class="ot"><b>${esc(b.name)}</b><span>${b.anonOnly ? '익명 전용' : b.access === 'restricted' ? '활동단 전용' : '커뮤니티 게시판'}</span></span><span class="check"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m5 13 4 4L19 7"/></svg></span></button>`).join('');

  let board = new URLSearchParams(location.search).get('board');
  if (!accessible.some(b => b.id === board)) board = accessible[0]?.id || 'free';
  let anonOn = true;
  let files = [];
  let rating = 0;

  /* ---- 별점 위젯(별점 게시판에서만 표시) ---- */
  const ratingRow = document.createElement('div');
  ratingRow.className = 'anon-row'; ratingRow.style.display = 'none';
  ratingRow.innerHTML = '<span class="ai" style="color:var(--amber)"><svg viewBox="0 0 24 24" fill="currentColor"><path d="m12 3 2.9 5.9 6.6 1-4.8 4.6 1.1 6.5L12 18l-5.8 3 1.1-6.5L2.5 9.9l6.6-1L12 3Z"/></svg></span><div class="txt"><b>별점</b><span id="ratingLabel">평가를 선택하세요</span></div><div id="stars" style="display:flex;gap:2px"></div>';
  $('anonHint').after(ratingRow);
  const starsEl = ratingRow.querySelector('#stars');
  for (let i = 1; i <= 5; i++) {
    const s = document.createElement('button');
    s.type = 'button'; s.dataset.v = i; s.textContent = '★';
    s.style.cssText = 'border:0;background:transparent;cursor:pointer;font-size:26px;line-height:1;color:#cbd5e1;padding:0 1px';
    s.onclick = () => setRating(i);
    starsEl.appendChild(s);
  }
  function setRating(v) {
    rating = v;
    [...starsEl.children].forEach((s, i) => s.style.color = i < v ? 'var(--amber)' : '#cbd5e1');
    ratingRow.querySelector('#ratingLabel').textContent = v ? `${v}점` : '평가를 선택하세요';
  }

  /* ---- 게시판 선택 ---- */
  function setBoard(id) {
    board = id;
    $('boardVal').innerHTML = esc(boardName(id)) + CHEVRON;
    [...document.querySelectorAll('#boardList .opt')].forEach(o => o.classList.toggle('sel', o.dataset.board === id));
    if (isAnonOnly(id) && !anonOn) { setAnon(true); toast('익명 전용 게시판이에요'); }
    // 사진 허용 여부
    const imgOk = boardFeature(id, 'allowImages');
    document.getElementById('photos').style.display = imgOk ? '' : 'none';
    document.querySelector('.tip').style.display = imgOk ? '' : 'none';
    $('photoTool').style.display = imgOk ? '' : 'none';
    if (!imgOk && files.length) { files = []; renderPhotos(); }
    // 별점 사용 여부
    const rateOk = boardFeature(id, 'allowRating');
    ratingRow.style.display = rateOk ? 'flex' : 'none';
    if (!rateOk) setRating(0);
  }
  $('boardSelector').onclick = () => $('boardSheet').classList.add('open');
  $('boardSheetBg').onclick = () => $('boardSheet').classList.remove('open');
  [...document.querySelectorAll('#boardList .opt')].forEach(o => o.onclick = () => { setBoard(o.dataset.board); $('boardSheet').classList.remove('open'); });

  /* ---- 익명 토글 ---- */
  function setAnon(on) {
    anonOn = on;
    $('anonSwitch').classList.toggle('on', on);
    $('anonRow').classList.toggle('on', on);
    $('anonTool').classList.toggle('on', on);
    $('anonToolLabel').textContent = on ? '익명' : '닉네임';
    $('anonTitle').textContent = on ? '익명으로 작성 중' : '닉네임으로 작성 중';
    $('anonSub').textContent = on ? '동아리·이름이 노출되지 않아요' : '활동용 닉네임으로 보여요';
    $('anonIcon').innerHTML = on
      ? '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C7 2 4 6 4 11c0 3 2 5 4 6 0 2 2 5 4 5s4-3 4-5c2-1 4-3 4-6 0-5-3-9-8-9Z"/></svg>'
      : '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10Zm0 2c-4 0-8 2-8 5v1h16v-1c0-3-4-5-8-5Z"/></svg>';
    const hint = $('anonHint');
    hint.style.color = on ? 'var(--anon)' : 'var(--muted)';
    hint.querySelector('span').textContent = on ? '안전한 익명 글쓰기가 활성화되었습니다' : '활동용 닉네임이 함께 노출됩니다';
  }
  function toggleAnon() {
    if (isAnonOnly(board)) { toast('익명 전용 게시판이에요'); return; }
    setAnon(!anonOn);
  }
  $('anonSwitch').onclick = toggleAnon;
  $('anonTool').onclick = toggleAnon;

  /* ---- 입력 검증 ---- */
  function checkReady() {
    const title = $('titleInput').value.trim();
    const body = $('bodyInput').value;
    $('bodyLen').textContent = body.length;
    $('submitBtn').disabled = !(title.length > 0 || body.trim().length > 0);
  }
  $('titleInput').oninput = checkReady;
  $('bodyInput').oninput = checkReady;

  /* ---- 사진 ---- */
  function renderPhotos() {
    [...document.querySelectorAll('#photos .thumb')].forEach(t => t.remove());
    const addBtn = $('addPhoto');
    files.forEach((f, i) => {
      const t = document.createElement('div');
      t.className = 'thumb';
      t.innerHTML = `<img src="${URL.createObjectURL(f)}" alt="">` +
        `<button class="rm" data-i="${i}" aria-label="삭제"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M18 6 6 18M6 6l12 12"/></svg></button>` +
        (i === 0 ? '<span class="cover">대표</span>' : '');
      addBtn.parentNode.insertBefore(t, addBtn);
    });
    [...document.querySelectorAll('#photos .thumb .rm')].forEach(b => b.onclick = () => { files.splice(+b.dataset.i, 1); renderPhotos(); });
    $('photoCount').textContent = `${files.length}/10`;
    addBtn.style.display = files.length >= 10 ? 'none' : '';
  }
  function pickPhotos() { if (files.length >= 10) { toast('사진은 최대 10장까지 첨부할 수 있어요'); return; } $('fileInput').click(); }
  $('addPhoto').onclick = pickPhotos;
  $('photoTool').onclick = pickPhotos;
  $('fileInput').onchange = e => {
    for (const f of e.target.files) { if (files.length >= 10) break; files.push(f); }
    e.target.value = '';
    renderPhotos();
  };

  /* ---- 이중 확인 + 게시 ---- */
  function trySubmit() {
    if ($('submitBtn').disabled) return;
    const icon = $('modalIcon'), title = $('modalTitle'), msg = $('modalMsg');
    if (anonOn) {
      icon.style.background = 'var(--anon-bg)'; icon.style.color = 'var(--anon)';
      icon.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C7 2 4 6 4 11c0 3 2 5 4 6 0 2 2 5 4 5s4-3 4-5c2-1 4-3 4-6 0-5-3-9-8-9Z"/></svg>';
      title.textContent = '익명으로 업로드';
      msg.innerHTML = '현재 <b>익명</b> 상태로 업로드됩니다. 작성자 정보는 다른 사용자에게 노출되지 않아요. 계속하시겠습니까?';
    } else {
      icon.style.background = '#e0f2fe'; icon.style.color = '#0369a1';
      icon.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10Zm0 2c-4 0-8 2-8 5v1h16v-1c0-3-4-5-8-5Z"/></svg>';
      title.textContent = '닉네임으로 업로드';
      msg.innerHTML = '현재 <b style="color:#0369a1">닉네임</b>으로 업로드됩니다. 활동용 닉네임이 함께 노출돼요. 계속하시겠습니까?';
    }
    $('confirmModal').classList.add('open');
  }
  function closeConfirm() { $('confirmModal').classList.remove('open'); }
  async function doPublish() {
    closeConfirm();
    $('submitBtn').disabled = true;
    $('confirmPublish').disabled = true;
    const titleVal = $('titleInput').value.trim();
    const bodyVal = $('bodyInput').value.trim();
    const title = titleVal || bodyVal.slice(0, 30) || '(제목 없음)';
    try {
      toast(files.length ? '이미지 업로드 중…' : '등록 중…');
      const id = await createPost({ board, title, content: bodyVal, isAnonymous: anonOn, imageFiles: files, rating });
      toast(anonOn ? '익명으로 글이 등록되었어요' : '닉네임으로 글이 등록되었어요');
      setTimeout(() => location.href = `home.html?board=${board}`, 800);
    } catch (e) {
      toast(e.message || '등록에 실패했어요');
      $('submitBtn').disabled = false;
      $('confirmPublish').disabled = false;
    }
  }
  $('submitBtn').onclick = trySubmit;
  $('confirmCancel').onclick = closeConfirm;
  $('confirmBg').onclick = closeConfirm;
  $('confirmPublish').onclick = doPublish;

  /* ---- init ---- */
  setBoard(board);
  checkReady();
</script>
</body>
</html>
