<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>번개 · 유스나루</title>
<link rel="stylesheet" href="assets/everytime.css?v=9" />
<script src="../env.js"></script>
<style>
  .mu-body{flex:1;overflow-y:auto;padding-bottom:84px}
  .match{margin:12px 16px 0;border-radius:18px;padding:18px;color:#fff;position:relative;overflow:hidden;background:linear-gradient(135deg,#4f46e5,#6366f1)}
  .match::after{content:"";position:absolute;right:-36px;bottom:-44px;width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,.13)}
  .match .k{font-size:11.5px;font-weight:800;letter-spacing:.04em;opacity:.9;display:flex;align-items:center;gap:6px}
  .match .k svg{width:15px;height:15px}
  .match h2{font-size:20px;font-weight:800;letter-spacing:-.02em;margin:9px 0 4px;position:relative}
  .match h2 b{font-size:26px}
  .match p{font-size:13px;opacity:.92;position:relative;line-height:1.5}
  .match .cta{margin-top:14px;display:inline-flex;align-items:center;gap:7px;background:#fff;color:var(--primary);border:0;border-radius:999px;padding:11px 18px;font-size:14px;font-weight:800;cursor:pointer;position:relative}
  .match .cta svg{width:16px;height:16px}
  .seg{display:flex;gap:6px;padding:14px 16px 6px}
  .seg button{flex:1;border:0;background:var(--secondary);color:var(--muted);padding:9px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer}
  .seg button.active{background:#1e1b4b;color:#fff}
  .mcard{background:var(--surface);padding:15px 16px;border-bottom:1px solid var(--border)}
  .mc-top{display:flex;align-items:center;gap:9px;margin-bottom:10px}
  .mc-live{font-size:11px;font-weight:800;color:var(--success);background:#f0fdf4;padding:4px 9px;border-radius:7px;display:flex;align-items:center;gap:5px}
  .mc-live .d{width:6px;height:6px;border-radius:50%;background:var(--success);animation:bp 1.6s infinite}
  .mc-when{font-size:11px;font-weight:800;color:var(--muted);background:var(--secondary);padding:4px 9px;border-radius:7px}
  @keyframes bp{0%{box-shadow:0 0 0 0 rgba(22,163,74,.5)}70%{box-shadow:0 0 0 6px rgba(22,163,74,0)}100%{box-shadow:0 0 0 0 rgba(22,163,74,0)}}
  .mc-host{font-size:11px;color:var(--faint);font-weight:600;margin-left:auto}
  .mcard h3{font-size:16px;font-weight:700;letter-spacing:-.01em;margin-bottom:6px}
  .mc-meta{display:flex;flex-wrap:wrap;gap:12px;font-size:12.5px;color:var(--muted);font-weight:600}
  .mc-meta span{display:flex;align-items:center;gap:5px;color:var(--muted)}
  .mc-meta svg{width:15px;height:15px;color:var(--faint)}
  .mc-parts{margin-top:11px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .mc-avs{display:flex}
  .mc-avs span{width:28px;height:28px;border-radius:50%;border:2px solid #fff;display:grid;place-items:center;font-size:11px;font-weight:800;color:#fff;margin-left:-8px;background:linear-gradient(135deg,#6366f1,#8b5cf6)}
  .mc-avs span:first-child{margin-left:0}
  .mc-avs span.more{background:var(--secondary);color:var(--muted)}
  .mc-names{font-size:11.5px;color:var(--muted);font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .mc-foot{display:flex;align-items:center;margin-top:13px}
  .mc-cnt{font-size:12px;color:var(--muted);font-weight:700}
  .join{margin-left:auto;border:0;background:var(--primary);color:#fff;font-size:13px;font-weight:800;padding:9px 16px;border-radius:10px;cursor:pointer}
  .join.joined{background:var(--secondary);color:var(--muted)}
  .mc-del{margin-left:8px;border:0;background:transparent;color:var(--faint);cursor:pointer;padding:6px}
  .mc-del svg{width:16px;height:16px}
  .random{margin:14px 16px;border:1.5px dashed var(--anon);border-radius:16px;padding:16px;display:flex;align-items:center;gap:13px;background:var(--anon-bg)}
  .random .ri{width:44px;height:44px;border-radius:13px;background:#fff;color:var(--anon);display:grid;place-items:center;flex:0 0 auto}
  .random .ri svg{width:23px;height:23px}
  .random .rt{flex:1}
  .random .rt b{font-size:14px;font-weight:800;display:block}
  .random .rt span{font-size:12px;color:var(--muted)}
  .random .go{border:0;background:var(--anon);color:#fff;width:38px;height:38px;border-radius:50%;display:grid;place-items:center;cursor:pointer;flex:0 0 auto}
  .random .go svg{width:20px;height:20px}
  /* 만들기 모달 */
  .cm-field{width:100%;border:1.5px solid var(--border);border-radius:12px;padding:12px 13px;font-size:14px;font-family:inherit;outline:none;margin-top:8px;background:var(--surface);color:var(--fg)}
  .cm-field:focus{border-color:var(--primary)}
  .cm-row{display:flex;gap:8px}
  .cm-row .cm-field{flex:1;min-width:0}
  .cm-anon{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--muted);margin-top:8px;flex:1;justify-content:center;border:1.5px solid var(--border);border-radius:12px;padding:12px 8px;cursor:pointer}
  .cm-anon input{width:18px;height:18px;accent-color:var(--anon)}
</style>
</head>
<body>
<div class="app" data-od-id="meetup">
  <header class="pagehead">
    <a class="back-btn" href="home.html" aria-label="뒤로"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg></a>
    <span class="title">번개</span>
    <span class="spacer"></span>
    <button class="back-btn" id="newBtn" type="button" aria-label="번개 만들기"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg></button>
  </header>

  <main class="mu-body">
    <section class="match">
      <div class="k"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2 4 14h7l-1 8 9-12h-7l1-8Z"/></svg>번개</div>
      <h2 id="heroTitle">번개를 불러오는 중…</h2>
      <p id="heroSub">비는 시간에 가볍게 만날 번개를 직접 열거나 참여해보세요.</p>
      <button class="cta" id="heroBtn" type="button">번개 만들기 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12h14"/></svg></button>
    </section>

    <div class="seg" id="seg">
      <button class="active" data-filter="open">모집 중</button>
      <button data-filter="mine">내가 참여</button>
      <button data-filter="past">지난 번개</button>
    </div>

    <div id="meetupList"></div>

    <div class="random">
      <span class="ri"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C7 2 4 6 4 11c0 3 2 5 4 6 0 2 2 5 4 5s4-3 4-5c2-1 4-3 4-6 0-5-3-9-8-9Z"/></svg></span>
      <div class="rt"><b>1:1 익명채팅</b><span>지금 비는 사람과 가볍게 랜덤 매칭</span></div>
      <a class="go" id="randomBtn" href="chat.html" aria-label="시작"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M5 12h14M13 6l6 6-6 6"/></svg></a>
    </div>
  </main>

  <nav class="botnav">
    <a class="nav-item" href="home.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 10 9-7 9 7"/><path d="M5 9v11h14V9"/></svg>홈</a>
    <a class="nav-item" href="board.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M8 9h8M8 13h6"/></svg>게시판</a>
    <a class="nav-item nav-write" href="write.html"><span class="fab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12h14"/></svg></span></a>
    <a class="nav-item" href="notifications.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>알림</a>
    <a class="nav-item" href="profile.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>프로필</a>
  </nav>
</div>

<!-- 번개 만들기 모달 -->
<div class="modal-wrap" id="createModal">
  <div class="modal-bg" id="cmBg"></div>
  <div class="modal" style="text-align:left">
    <h4 style="text-align:center;margin-bottom:2px">번개 만들기</h4>
    <input id="cmTitle" class="cm-field" type="text" maxlength="60" placeholder="무엇을 함께 할까요? (예: 점심 같이 먹을 사람)" />
    <div style="font-size:11.5px;color:var(--faint);font-weight:700;margin-top:10px">시작</div>
    <div class="cm-row">
      <select id="cmDate" class="cm-field"></select>
      <select id="cmTime" class="cm-field"></select>
    </div>
    <div style="font-size:11.5px;color:var(--faint);font-weight:700;margin-top:8px">끝나는 시간 (도달 시 자동 종료)</div>
    <select id="cmEnd" class="cm-field"></select>
    <input id="cmPlace" class="cm-field" type="text" maxlength="40" placeholder="장소 (예: 정문 학생식당)" />
    <textarea id="cmDesc" class="cm-field" maxlength="500" rows="3" placeholder="세부 내용 (선택) — 준비물, 인원, 모이는 방법 등" style="resize:none;line-height:1.5"></textarea>
    <div class="cm-row">
      <select id="cmCap" class="cm-field" style="flex:0 0 40%"></select>
      <label class="cm-anon"><input type="checkbox" id="cmAnon" /> 익명 주최</label>
    </div>
    <div class="modal-actions">
      <button class="btn ghost" style="flex:1" id="cmCancel" type="button">취소</button>
      <button class="btn primary" style="flex:1" id="cmSave" type="button">번개 열기</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
  import { requireLoginOrRedirect, subscribeMeetups, createMeetup, toggleMeetupJoin, deleteMeetup, getUserNickname } from './community-data.js?v=9';
  import { esc, toast, emptyHTML, linkify, mountOnlineBadge } from './community-ui.js?v=9';

  const me = await requireLoginOrRedirect();
  mountOnlineBadge();
  const myUid = me.uid;
  const $ = id => document.getElementById(id);
  const listEl = $('meetupList');
  const segBtns = [...document.querySelectorAll('#seg button')];
  let filter = 'open';
  let meetups = [];
  const nameMap = {}; // uid -> 닉네임

  const CLOCK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 2"/></svg>';
  const PIN = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7-5.6-7-11a7 7 0 0 1 14 0c0 5.4-7 11-7 11Z"/><circle cx="12" cy="10" r="2.5"/></svg>';

  function hostLabel(m) { return m.isAnonymous ? '익명 주최' : `${m.hostNickname || '익명'} 주최`; }

  function avatarsHTML(parts) {
    const shown = parts.slice(0, 4);
    let h = shown.map(uid => `<span title="${esc(nameMap[uid] || '…')}">${esc((nameMap[uid] || '·').slice(0, 1))}</span>`).join('');
    if (parts.length > 4) h += `<span class="more">+${parts.length - 4}</span>`;
    return h;
  }
  function namesText(parts) {
    const names = parts.map(uid => nameMap[uid] || '…');
    return names.join(', ');
  }

  // 종료 시간(endAt) 도달 시 자동으로 '지난 번개' 처리
  function isLive(m) {
    if ((m.status || 'OPEN') !== 'OPEN') return false;
    if (m.endAt && Date.now() >= m.endAt) return false;
    return true;
  }
  function endLabel(m) {
    if (!m.endAt) return '';
    const d = new Date(m.endAt);
    return `~${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')} 종료`;
  }

  function meetupCardHTML(m) {
    const parts = m.participants || [];
    const joined = parts.includes(myUid);
    const cap = m.capacity || 0, cnt = m.participantCount || parts.length;
    const live = isLive(m);
    const tag = live ? '<span class="mc-live"><span class="d"></span>모집 중</span>' : '<span class="mc-when">종료됨</span>';
    const canDelete = m.hostUid === myUid || me.isAdmin;
    return `
    <article class="mcard" data-id="${esc(m.id)}">
      <div class="mc-top">${tag}<span class="mc-host">${esc(hostLabel(m))}</span></div>
      <h3>${esc(m.title || '제목 없음')}</h3>
      <div class="mc-meta">
        ${m.time ? `<span>${CLOCK}${esc(m.time)}${m.endAt ? ' · ' + esc(endLabel(m)) : ''}</span>` : ''}
        ${m.location ? `<span>${PIN}${esc(m.location)}</span>` : ''}
      </div>
      ${m.description ? `<p style="font-size:13px;line-height:1.55;color:var(--muted);margin-top:8px;white-space:pre-line" class="mc-desc">${linkify(esc(m.description))}</p>` : ''}
      <div class="mc-parts">
        <div class="mc-avs">${avatarsHTML(parts)}</div>
        <div class="mc-names">${esc(namesText(parts))}</div>
      </div>
      <div class="mc-foot">
        <span class="mc-cnt">${cnt} / ${cap}명 참여</span>
        ${live ? `<button class="join${joined ? ' joined' : ''}" data-id="${esc(m.id)}" type="button">${joined ? '참여취소' : '참여'}</button>` : ''}
        ${canDelete ? `<button class="mc-del" data-del="${esc(m.id)}" type="button" title="번개 삭제"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg></button>` : ''}
      </div>
    </article>`;
  }

  function filtered() {
    if (filter === 'open') return meetups.filter(isLive);
    if (filter === 'mine') return meetups.filter(m => (m.participants || []).includes(myUid));
    return meetups.filter(m => !isLive(m));
  }
  function renderHero() {
    const open = meetups.filter(isLive).length;
    if (open > 0) { $('heroTitle').innerHTML = `지금 모집 중인 번개 <b>${open}</b>개`; $('heroSub').textContent = '마음에 드는 번개에 참여하거나, 새 번개를 직접 열어보세요.'; }
    else { $('heroTitle').textContent = '아직 열린 번개가 없어요'; $('heroSub').textContent = '비는 시간에 가볍게 만날 첫 번개를 열어보세요.'; }
  }
  async function ensureNames() {
    const uids = new Set();
    meetups.forEach(m => (m.participants || []).forEach(u => uids.add(u)));
    await Promise.all([...uids].filter(u => !(u in nameMap)).map(async u => { nameMap[u] = await getUserNickname(u); }));
  }
  async function render() {
    renderHero();
    await ensureNames();
    const items = filtered();
    if (!items.length) {
      listEl.innerHTML = emptyHTML(filter === 'mine' ? '아직 참여한 번개가 없어요.' : filter === 'past' ? '지난 번개가 없어요.' : '아직 열린 번개가 없어요. 첫 번개를 열어보세요!');
      return;
    }
    listEl.innerHTML = items.map(meetupCardHTML).join('');
  }

  segBtns.forEach(b => b.onclick = () => { segBtns.forEach(x => x.classList.remove('active')); b.classList.add('active'); filter = b.dataset.filter; render(); });

  // 참여 / 삭제 (위임)
  listEl.addEventListener('click', async (e) => {
    const join = e.target.closest('.join');
    const del = e.target.closest('.mc-del');
    if (join) {
      join.disabled = true;
      try { const j = await toggleMeetupJoin(join.dataset.id); toast(j ? '번개에 참여했어요' : '참여를 취소했어요'); }
      catch (err) { toast(err?.message || '잠시 후 다시 시도해주세요'); } finally { join.disabled = false; }
    } else if (del) {
      if (!confirm('이 번개를 삭제할까요?')) return;
      try { await deleteMeetup(del.dataset.del); toast('번개를 삭제했어요'); } catch (err) { toast(err?.message || '삭제 실패'); }
    }
  });

  // ── 번개 만들기 모달 ──
  const TIME_SLOTS = [];
  for (let h = 9; h <= 23; h++) { TIME_SLOTS.push(`${String(h).padStart(2, '0')}:00`); if (h < 23) TIME_SLOTS.push(`${String(h).padStart(2, '0')}:30`); }
  // 날짜 오프셋(일): 오늘=0, 내일=1, 모레=2, 이번 주말=다가오는 토요일
  function dateOffset(label) {
    if (label === '내일') return 1; if (label === '모레') return 2;
    if (label === '이번 주말') { const d = new Date().getDay(); return (6 - d + 7) % 7 || 6; }
    return 0;
  }
  // 시작시각(date+time)과 끝시각(end HH:MM) → 종료 ms timestamp
  function computeEndAt(dateLabel, endHHMM) {
    if (!endHHMM) return 0;
    const base = new Date(); base.setDate(base.getDate() + dateOffset(dateLabel));
    const [h, m] = endHHMM.split(':').map(Number);
    base.setHours(h, m, 0, 0);
    if (base.getTime() < Date.now()) base.setDate(base.getDate() + 1); // 이미 지났으면 다음날로
    return base.getTime();
  }
  (function fillSelects() {
    const dates = ['오늘', '내일', '모레', '이번 주말'];
    $('cmDate').innerHTML = dates.map(t => `<option value="${t}">${t}</option>`).join('');
    $('cmTime').innerHTML = ['지금 바로', ...TIME_SLOTS].map(t => `<option value="${t}">${t}</option>`).join('');
    $('cmEnd').innerHTML = '<option value="">지정 안 함</option>' + TIME_SLOTS.map(t => `<option value="${t}">${t}</option>`).join('');
    let caps = '';
    for (let n = 2; n <= 12; n++) caps += `<option value="${n}"${n === 4 ? ' selected' : ''}>${n}명</option>`;
    $('cmCap').innerHTML = caps;
  })();
  function openCreate() { $('cmTitle').value = ''; $('cmPlace').value = ''; $('cmDesc').value = ''; $('cmAnon').checked = false; $('cmEnd').value = ''; $('createModal').classList.add('open'); setTimeout(() => $('cmTitle').focus(), 50); }
  function closeCreate() { $('createModal').classList.remove('open'); }
  $('newBtn').onclick = openCreate; $('heroBtn').onclick = openCreate;
  $('cmBg').onclick = $('cmCancel').onclick = closeCreate;
  $('cmSave').onclick = async () => {
    const title = $('cmTitle').value.trim();
    if (!title) { toast('제목을 입력하세요'); return; }
    const date = $('cmDate').value, t = $('cmTime').value;
    const time = t === '지금 바로' ? `${date} 지금 바로` : `${date} ${t}`;
    const endAt = computeEndAt(date, $('cmEnd').value);
    if (endAt && t !== '지금 바로') { /* 종료가 시작보다 빠르면 다음날 처리됨 */ }
    const location = $('cmPlace').value.trim();
    const description = $('cmDesc').value.trim();
    const capacity = Number($('cmCap').value) || 4;
    const isAnonymous = $('cmAnon').checked;
    $('cmSave').disabled = true;
    try {
      await createMeetup({ title, time, location, description, endAt, capacity, isAnonymous });
      closeCreate(); toast('번개를 열었어요!');
      segBtns.forEach(x => x.classList.remove('active')); segBtns[0].classList.add('active'); filter = 'open';
    } catch (err) { toast(err?.message || '번개 생성에 실패했어요'); } finally { $('cmSave').disabled = false; }
  };

  // 종료시각 도달 시 자동으로 목록 갱신(1분마다 재렌더)
  setInterval(() => { if (meetups.length) render(); }, 60000);

  // 라이브 구독
  listEl.innerHTML = emptyHTML('불러오는 중…');
  subscribeMeetups(list => { meetups = list; render(); }, { max: 50 });
</script>
</body>
</html>
