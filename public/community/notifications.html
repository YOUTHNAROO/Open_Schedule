<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>알림 · 유스나루</title>
<link rel="stylesheet" href="assets/everytime.css?v=9" />
<script src="../env.js"></script>
<style>
  .nf-ico{background:var(--secondary);color:var(--muted)}
  .nf-ico.like{background:#fef2f2;color:var(--danger)}
  .nf-ico.cmt{background:var(--anon-bg);color:var(--anon)}
  .nf-ico.bolt{background:#fffbeb;color:var(--amber)}
  .nf-ico.star{background:#eff6ff;color:#2563eb}
  .row .rt b{font-weight:600}
  .row .rt b em{font-style:normal;font-weight:800}
  .read-all{border:0;background:transparent;color:var(--primary);font-size:13px;font-weight:700;cursor:pointer;padding:9px 12px}
</style>
</head>
<body>
<div class="app" data-od-id="notifications">
  <header class="pagehead">
    <a class="back-btn" href="home.html" aria-label="뒤로"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg></a>
    <span class="title">알림</span>
    <span class="spacer"></span>
    <button class="read-all" id="readAllBtn">모두 읽음</button>
  </header>

  <main class="scrollbody" style="padding-bottom:84px">
    <div id="nfList"></div>
  </main>

  <nav class="botnav">
    <a class="nav-item" href="home.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 10 9-7 9 7"/><path d="M5 9v11h14V9"/></svg>홈</a>
    <a class="nav-item" href="board.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M8 9h8M8 13h6"/></svg>게시판</a>
    <a class="nav-item nav-write" href="write.html"><span class="fab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12h14"/></svg></span></a>
    <a class="nav-item active" href="notifications.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>알림</a>
    <a class="nav-item" href="profile.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>프로필</a>
  </nav>
</div>

<script type="module">
  import { requireLoginOrRedirect, subscribeNotifications, markAllNotificationsRead, syncMyNotifications } from './community-data.js?v=9';
  import { esc, timeAgo, toast, emptyHTML, mountOnlineBadge } from './community-ui.js?v=9';

  await requireLoginOrRedirect();
  mountOnlineBadge();
  syncMyNotifications().catch(() => {}); // 진입 시 내 글·번개 변화 동기화

  const listEl = document.getElementById('nfList');

  // 알림 타입별 아이콘(클래스 + SVG)
  const HEART = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>';
  const CHAT = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.5 8.5 0 0 1-12.3 7.6L3 21l1.9-5.7A8.5 8.5 0 1 1 21 11.5Z"/></svg>';
  const BOLT = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2 4 14h7l-1 8 9-12h-7l1-8Z"/></svg>';
  const STAR = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m12 3 2.9 5.9 6.6 1-4.8 4.6 1.1 6.5L12 18l-5.8 3 1.1-6.5L2.5 9.9l6.6-1L12 3Z"/></svg>';
  const BELL = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>';

  function iconFor(type) {
    switch (type) {
      case 'like':   return { cls: 'like', svg: HEART };
      case 'comment':
      case 'reply':  return { cls: 'cmt',  svg: CHAT };
      case 'meetup': return { cls: 'bolt', svg: BOLT };
      case 'review': return { cls: 'star', svg: STAR };
      default:       return { cls: '',     svg: BELL };
    }
  }

  function rowHTML(n) {
    const ic = iconFor(n.type);
    const unread = n.read ? '' : ' unread';
    const dot = n.read ? '' : '<span class="udot"></span>';
    return `
    <a class="row${unread}" data-id="${esc(n.id)}" data-link="${esc(n.link || '')}">
      <span class="ri nf-ico ${ic.cls}">${ic.svg}</span>
      <div class="rt"><b>${esc(n.text || '')}</b></div>
      <span class="rmeta">${esc(timeAgo(n.createdAt))}</span>${dot}
    </a>`;
  }

  await subscribeNotifications(list => {
    if (!list || !list.length) {
      listEl.innerHTML = emptyHTML('새로운 알림이 없어요');
      return;
    }
    listEl.innerHTML = list.map(rowHTML).join('');
  });

  // 행 클릭 → link 로 이동
  listEl.addEventListener('click', e => {
    const row = e.target.closest('.row');
    if (!row) return;
    const link = row.dataset.link;
    if (link) location.href = link;
  });

  // 모두 읽음
  document.getElementById('readAllBtn').addEventListener('click', async () => {
    try {
      await markAllNotificationsRead();
      toast('모든 알림을 읽음으로 표시했어요');
    } catch (err) {
      toast('읽음 처리에 실패했어요');
    }
  });
</script>
</body>
</html>
