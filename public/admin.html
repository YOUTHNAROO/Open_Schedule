    async function hashPw(pw) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }
    function getTeam(id) { return TEAMS.find(t => t.id === id) || null; }
    function getWeekId(date) {
      const d = new Date(date);
      d.setHours(0, 0, 0, 0);
      d.setDate(d.getDate() + 3 - (d.getDay() + 6) % 7);
      const week1 = new Date(d.getFullYear(), 0, 4);
      const wn = 1 + Math.round(((d - week1) / 864e5 - 3 + (week1.getDay() + 6) % 7) / 7);
      return `${d.getFullYear()}-W${String(wn).padStart(2, '0')}`;
    }

    function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
    function normalizeSheetTime(time) {
      const first = String(time || '').split('~')[0].replace(/\s+/g, '').trim();
      const match = first.match(/^(\d{1,2}):(\d{2})$/);
      return match ? `${match[1].padStart(2, '0')}:${match[2]}` : first;
    }
    function normalizeSheetRoom(room) {
      return String(room || '').split('(')[0].replace(/\s+/g, ' ').trim();
    }
    function fmtTime(ts) {
      if (!ts) return '-';
      const d = typeof ts === 'string' ? new Date(ts) : (ts.seconds ? new Date(ts.seconds * 1000) : new Date(ts));
      return d.toLocaleString('ko-KR', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    }

    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast'), m = document.getElementById('toast-msg');
      if (!t || !m) return;
      m.textContent = msg;
      const base = 'fixed bottom-20 md:bottom-6 left-1/2 -translate-x-1/2 z-[200] flex items-center gap-2 text-white px-5 py-3 rounded-2xl shadow-2xl text-sm font-semibold pointer-events-none transition-all duration-300 ';
      t.className = base + (type === 'success' ? 'bg-emerald-600' : type === 'error' ? 'bg-red-600' : 'bg-blue-600');
      t.style.opacity = '1'; t.style.transform = 'translateX(-50%) translateY(0)';
      clearTimeout(t._t);
      t._t = setTimeout(() => {
        t.style.opacity = '0';
        t.style.transform = 'translateX(-50%) translateY(16px)';
      }, 3000);
    }
    function showModal(id) { document.getElementById(id)?.classList.remove('hidden'); }
    function hideModal(id) { document.getElementById(id)?.classList.add('hidden'); }

    function showConfirm(msg, { title = '확인', okText = '확인', danger = false } = {}) {
      return new Promise(resolve => {
        const modal = document.getElementById('confirm-modal');
        const titleEl = document.getElementById('confirm-modal-title');
        const msgEl = document.getElementById('confirm-modal-msg');
        const okBtn = document.getElementById('confirm-modal-ok');
        const cancelBtn = document.getElementById('confirm-modal-cancel');
        const header = document.getElementById('confirm-modal-header');
        if (!modal) { resolve(window.confirm(msg)); return; }
        if (titleEl) titleEl.textContent = title;
        if (msgEl) msgEl.textContent = msg;
        if (okBtn) { okBtn.textContent = okText; okBtn.className = `flex-1 py-2.5 rounded-xl text-sm font-bold text-white transition-colors ${danger ? 'bg-red-600 hover:bg-red-700' : 'bg-teal-600 hover:bg-teal-700'}`; }
        if (header) header.className = `h-1.5 w-full ${danger ? 'bg-red-500' : 'bg-amber-400'}`;
        modal.classList.remove('hidden');
        lucide.createIcons();
        const cleanup = () => modal.classList.add('hidden');
        okBtn.onclick = () => { cleanup(); resolve(true); };
        cancelBtn.onclick = () => { cleanup(); resolve(false); };
        document.getElementById('confirm-modal-backdrop')?.addEventListener('click', () => { cleanup(); resolve(false); }, { once: true });
      });
    }

    // ========== AUTH ==========
    async function loginUser(username, password) {
      const email = username.includes('@') ? username : `${username}@youthnaroo.local`;
      
      const userCredential = await signInWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;

      const userDocRef = doc(db, 'users', user.uid);
      let userDocSnap = await getDoc(userDocRef);

      // 초기화 폴백: 만약 최초 주관리자 계정(admin@youthnaroo.local)인데 Firestore에 문서가 없다면 자동 생성
      if (!userDocSnap.exists() && email === 'admin@youthnaroo.local') {
        const initialAdmin = {
          username: 'admin',
          displayName: '시스템관리자',
          role: 'superadmin',
          allowedTeams: [],
          isActive: true,
          createdAt: serverTimestamp(),
          createdBy: 'system'
        };
        await setDoc(userDocRef, initialAdmin);
        userDocSnap = await getDoc(userDocRef);
      }

      if (!userDocSnap.exists()) {
        await signOut(auth);
        throw new Error('등록되지 않은 사용자입니다. 관리자에게 문의하세요.');
      }

      const userData = userDocSnap.data();
      if (!userData.isActive) {
        await signOut(auth);
        throw new Error('비활성화된 계정입니다. 관리자에게 문의하세요.');
      }

      if (userData.role !== 'admin' && userData.role !== 'superadmin') {
        await signOut(auth);
        throw new Error('관리자 권한이 없습니다.');
      }

      await addLoginLog(user.uid, userData.username, 'login', userData.displayName);

      return {
        id: user.uid,
        username: userData.username,
        displayName: userData.displayName,
        role: userData.role,
        allowedTeams: userData.allowedTeams || []
      };
    }

    // ========== DATA ==========
    async function loadTeams() {
      try {
        const s = await getDocs(collection(db, 'teams'));
        if (!s.empty) {
          TEAMS = [];
          s.forEach(d => TEAMS.push({ id: d.id, ...d.data() }));
        } else {
          const batch = writeBatch(db);
          DEFAULT_TEAMS.forEach(team => {
            const ref = doc(db, 'teams', team.id);
            batch.set(ref, { ...team, createdAt: serverTimestamp() });
          });
          await batch.commit();
          TEAMS = [...DEFAULT_TEAMS];
        }
      } catch (e) { console.error('활동단 로드 에러:', e); }
    }

    async function loadUsers() {
      const s = await getDocs(collection(db, 'users'));
      return s.docs.map(d => ({ id: d.id, ...d.data() }));
    }

    async function loadLoginLogs(page = 1) {
      const q = query(collection(db, 'login_logs'), orderBy('timestamp', 'desc'), limit(page * PAGE_SIZE));
      const s = await getDocs(q);
      const all = s.docs.map(d => ({ id: d.id, ...d.data() }));
      return { logs: all.slice((page - 1) * PAGE_SIZE), total: all.length };
    }

    async function loadActivityLogs(page = 1) {
      const q = query(collection(db, 'activity_logs'), orderBy('timestamp', 'desc'), limit(page * PAGE_SIZE));
      const s = await getDocs(q);
      const all = s.docs.map(d => ({ id: d.id, ...d.data() }));
      return { logs: all.slice((page - 1) * PAGE_SIZE), total: all.length };
    }

    // ========== USER CRUD ==========
    async function createUser({ username, displayName, password, role, allowedTeams, isActive, photoUrl }) {
      const email = `${username}@youthnaroo.local`;

      // 보조 앱을 사용하여 관리자 세션 유지하며 계정 생성
      const secondaryApp = initializeApp(firebaseConfig, "SecondaryApp_" + Date.now());
      const secondaryAuth = getAuth(secondaryApp);

      try {
        const q = query(collection(db, 'users'), where('username', '==', username));
        if (!(await getDocs(q)).empty) throw new Error('이미 사용 중인 아이디입니다.');

        const userCredential = await createUserWithEmailAndPassword(secondaryAuth, email, password);
        const newUid = userCredential.user.uid;
        await secondaryAuth.signOut();

        const ref = doc(db, 'users', newUid);
        const userData = { username, displayName, role, allowedTeams, isActive, createdAt: serverTimestamp(), createdBy: currentUser.displayName };
        if (photoUrl) userData.photoUrl = photoUrl;
        await setDoc(ref, userData);
        await addActivityLog('사용자_생성', username, null, { role, allowedTeams });
      } catch (err) {
        console.error('사용자 가입 에러:', err);
        throw err;
      } finally {
        await deleteApp(secondaryApp);
      }
    }

    async function updateUser(id, { displayName, role, allowedTeams, isActive, newPassword, photoUrl }, oldData = {}) {
      const upd = { displayName, role, allowedTeams, isActive, updatedAt: serverTimestamp() };
      if (newPassword && newPassword.length >= 6) {
        upd.pendingPasswordChange = newPassword;
      }
      if (photoUrl !== undefined) upd.photoUrl = photoUrl;
      await updateDoc(doc(db, 'users', id), upd);
      const oldUsername = oldData?.username || '알수없음';
      await addActivityLog('사용자_수정', oldUsername, oldData || null, { displayName, role, allowedTeams, isActive, passwordChanged: !!(newPassword) });
    }

    async function deleteUser(id, username) {
      await deleteDoc(doc(db, 'users', id));
      await addActivityLog('사용자_삭제', username, null, null);
    }

      activeTab = tab;
      document.querySelectorAll('[data-tab]').forEach(el => {
        const isActive = el.dataset.tab === tab;
        el.classList.toggle('bg-slate-800', isActive);
        el.classList.toggle('text-white', isActive);
        el.classList.toggle('text-slate-400', !isActive);
        el.classList.toggle('hover:bg-slate-700', !isActive);

      });
      document.querySelectorAll('[data-panel]').forEach(el => {

    function genCode() {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      return Array.from(crypto.getRandomValues(new Uint8Array(8))).map(b => chars[b % chars.length]).join('');
    }

    window.loadArchivePanel = async function (weekId) {
      const c = document.getElementById('archive-content');
      if (!weekId || !c) return;

        if (!snap.exists()) { c.innerHTML = `<div class="text-center py-12 text-slate-400 text-sm">기록을 찾을 수 없습니다</div>`; return; }
        const data = snap.data().data;
        let html = `<div class="flex justify-end mb-3"><button onclick="exportArchiveExcel('${esc(weekId)}')" class="flex items-center gap-1.5 text-xs font-semibold text-emerald-700 bg-emerald-50 border border-emerald-200 px-3 py-1.5 rounded-lg hover:bg-emerald-100 transition-all"><i data-lucide="download" class="w-3.5 h-3.5"></i> 엑셀 저장</button></div>`;
        DAYS.forEach(day => {
          const dd = data[day.id] || {};
          const cnt = Object.keys(dd).length;
          html += `<div class="mb-6"><h4 class="text-xs font-bold text-slate-600 mb-2">${day.label} <span class="font-normal text-slate-400">(${cnt}건)</span></h4>`;

            HOURS.forEach(h => {
              html += `<tr><td class="px-2 py-1.5 border border-slate-200 font-bold text-slate-500 bg-slate-50 text-center">${h}</td>`;

                else html += `<td class="px-2 py-1.5 border border-slate-100 text-slate-200 text-center">·</td>`;
              });
              html += `</tr>`;
            });
            html += `</tbody></table></div>`;
          }

    };

    window.exportArchiveExcel = async function (weekId) {
      showToast('엑셀 준비 중...', 'info');
      try {
        const snap = await getDoc(doc(db, 'archive', weekId));
        if (!snap.exists()) { showToast('데이터 없음', 'error'); return; }
        const data = snap.data().data;
        const wb = XLSX.utils.book_new();
        DAYS.forEach(day => {
          const dd = data[day.id] || {};
          const rows = [['시간', ...ALL_ROOMS]];
          HOURS.forEach(h => rows.push([h, ...ALL_ROOMS.map(r => { const res = dd[`${h}-${r}`]; return res ? `${res.teamName}${res.isFixed ? ' (고정)' : ''}` : ''; })]));
          const ws = XLSX.utils.aoa_to_sheet(rows);
          ws['!cols'] = [{ wch: 8 }, ...ALL_ROOMS.map(() => ({ wch: 14 }))];
          XLSX.utils.book_append_sheet(wb, ws, day.label);
        });
        XLSX.writeFile(wb, `유스나루_${weekId}.xlsx`);
        showToast('엑셀 다운로드 완료!', 'success');
      } catch (e) { showToast('실패: ' + e.message, 'error'); }
    };

          const btn = document.getElementById('sync-sheet-to-web-btn');

          const activeTabName = document.getElementById('sheet-tabname').value;
          
          if (!gasUrl) { showToast('먼저 Apps Script 웹 앱 URL을 입력해 주세요.', 'error'); return; }
          if (!activeTabName || activeTabName === '시트 선택') { showToast('동기화할 시트 탭 이름을 선택해 주세요.', 'error'); return; }

          }
          
          btn.disabled = true;
          const origContent = btn.innerHTML;
          btn.innerHTML = `<div class="w-3.5 h-3.5 border-2 border-white border-t-transparent rounded-full animate-spin mr-1.5"></div>동기화 진행 중...`;
          
          try {
            showToast('구글 시트에서 전체 예약을 가져오고 있습니다...', 'info');
            const response = await fetch(`${gasUrl}?activeTabName=${encodeURIComponent(activeTabName)}`);
            const data = await response.json();
            
            if (data.error) {
              throw new Error(data.error);
            }
            
            if (!data.reservations || !Array.isArray(data.reservations)) {
              throw new Error('시트 예약 목록을 가져올 수 없거나 형식이 올바르지 않습니다.');
            }
            
            showToast('웹 예약 데이터 일괄 업데이트 중...', 'info');
            
            const currentWeekId = getWeekId(new Date());
            const daysToSync = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'];
            
            // 1. 기존 예약을 요일별로 삭제
            for (const dId of daysToSync) {
              const colRef = collection(db, `reservations/${currentWeekId}/${dId}`);
              const snap = await getDocs(colRef);
              const batch = writeBatch(db);
              snap.forEach(docSnap => {
                batch.delete(docSnap.ref);
              });
              await batch.commit();
            }
            
            // 2. Apps Script에서 가져온 새 예약을 요일별로 분류 후 추가
            const reservationsByDay = { mon: [], tue: [], wed: [], thu: [], fri: [], sat: [], sun: [] };
            data.reservations.forEach(r => {
              const matchedDay = DAYS.find(d => d.label === r.day);
              if (matchedDay) {
                reservationsByDay[matchedDay.id].push(r);
              }
            });
            
            for (const dId of daysToSync) {
              const batch = writeBatch(db);
              const list = reservationsByDay[dId];
              list.forEach(r => {
                const cleanTime = normalizeSheetTime(r.time);
                const roomName = normalizeSheetRoom(r.room);
                if (!HOURS.includes(cleanTime) || !ALL_ROOMS.includes(roomName)) return;
                const key = `${cleanTime}-${roomName}`.replace(/\//g, '_');
                const docRef = doc(db, `reservations/${currentWeekId}/${dId}`, key);
                
                const matchedTeam = TEAMS.find(t => t.name === r.teamName);
                const teamId = matchedTeam ? matchedTeam.id : 'external';
                
                batch.set(docRef, {
                  teamId: teamId,
                  teamName: r.teamName,
                  userName: r.userName || '외부예약',
                  room: roomName,
                  hour: cleanTime,
                  note: r.note || '',
                  sheetColor: r.sheetColor || '',
                  sheetOwner: r.sheetOwner || '',
                  apiToken: 'youthnaroo_secret_token_2026',
                  updatedAt: serverTimestamp()
                });
              });
              await batch.commit();
            }
            
            showToast('전체 동기화가 성공적으로 완료되었습니다!', 'success');
          } catch (err) {
            console.error('Sync Error:', err);
            showToast('동기화 실패: ' + err.message, 'error');
          } finally {
            btn.disabled = false;
            btn.innerHTML = origContent;
          }
        });

    function compressImageToBase64(file, maxSize = 400, quality = 0.8) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        const objectUrl = URL.createObjectURL(file);
        img.onload = () => {
          URL.revokeObjectURL(objectUrl);
          const scale = Math.min(maxSize / img.width, maxSize / img.height, 1);
          const w = Math.round(img.width * scale);
          const h = Math.round(img.height * scale);
          const canvas = document.createElement('canvas');
          canvas.width = w;
          canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.onerror = reject;
        img.src = objectUrl;
      });
    }

            <div class="flex flex-col items-center gap-2 group">
              <div class="relative">
                <img src="${esc(c.photoUrl || '')}" alt="${esc(c.name)}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(c.name)}&background=0d9488&color=fff&size=128'" class="w-20 h-20 rounded-full object-cover border-4 border-white shadow-lg">
                ${canEdit ? `<div class="absolute inset-0 rounded-full bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-1">
                  <button onclick="editContributor('${esc(c.id)}')" class="p-1 bg-white rounded-full text-slate-700 hover:text-teal-600"><i data-lucide="pencil" class="w-3 h-3"></i></button>
                  <button onclick="deleteContributor('${esc(c.id)}', '${esc(c.name)}')" class="p-1 bg-white rounded-full text-red-500 hover:text-red-700"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
                </div>` : ''}
              </div>
              <div class="text-center">
                <div class="text-sm font-bold text-slate-800">${esc(c.name)}</div>
                ${c.role ? `<div class="text-xs text-slate-500">${esc(c.role)}</div>` : ''}
              </div>
            </div>
          `).join('')}
          ${contributors.length === 0 ? `<div class="col-span-full text-center py-16 text-slate-400 text-sm">등록된 기여자가 없습니다.</div>` : ''}
        </div>
      `;

      if (canEdit) {
        document.getElementById('add-contrib-btn')?.addEventListener('click', () => openContributorModal());
      }
      lucide.createIcons();
    }

    async function openContributorModal(id = null) {
      let data = null;
      if (id) {
        const snap = await getDoc(doc(db, 'contributors', id));
        if (snap.exists()) data = { id: snap.id, ...snap.data() };
      }
      document.getElementById('contrib-modal-title').textContent = data ? '기여자 수정' : '기여자 추가';
      document.getElementById('contrib-id-field').value = data?.id || '';
      document.getElementById('contrib-name').value = data?.name || '';
      document.getElementById('contrib-role').value = data?.role || '';
      document.getElementById('contrib-photo').value = data?.photoUrl || '';
      document.getElementById('contrib-order').value = data?.order ?? 99;
      const fileInput = document.getElementById('contrib-photo-file');
      if (fileInput) fileInput.value = '';
      const statusEl = document.getElementById('contrib-upload-status');
      if (statusEl) { statusEl.textContent = '이미지 파일 선택 (용량 무관, 자동 압축)'; statusEl.className = 'text-[10px] text-slate-400 mt-1'; }
      const preview = document.getElementById('contrib-photo-preview');
      if (preview) {
        if (data?.photoUrl) { preview.src = data.photoUrl; preview.classList.remove('hidden'); }
        else { preview.src = ''; preview.classList.add('hidden'); }
      }
      showModal('contributor-modal');
      lucide.createIcons();
    }

    window.editContributor = async function(id) { openContributorModal(id); };

    window.deleteContributor = async function(id, name) {
      if (!await showConfirm(`기여자 [${name}]를 삭제하시겠습니까?`, { title: '기여자 삭제', okText: '삭제', danger: true })) return;
      await deleteDoc(doc(db, 'contributors', id));
      showToast('기여자가 삭제되었습니다.', 'success');
      renderContributors();
    };

    // ========== INIT ==========
    async function initApp() {
      fetchIP();

      // Tab nav
      document.querySelectorAll('[data-tab]').forEach(btn => {
        btn.addEventListener('click', () => setActiveTab(btn.dataset.tab));
      });

      // Logout
      document.getElementById('logout-btn')?.addEventListener('click', doLogout);

      function authErrMsg(err) {
        const map = {
          'auth/invalid-credential': '아이디 또는 비밀번호가 올바르지 않습니다.',
          'auth/wrong-password': '아이디 또는 비밀번호가 올바르지 않습니다.',
          'auth/user-not-found': '아이디 또는 비밀번호가 올바르지 않습니다.',
          'auth/too-many-requests': '로그인 시도가 너무 많아 일시적으로 잠겼습니다. 잠시 후 다시 시도해주세요.',
          'auth/network-request-failed': '네트워크 오류가 발생했습니다. 인터넷 연결을 확인해주세요.',
          'auth/user-disabled': '비활성화된 계정입니다. 관리자에게 문의하세요.',
        };
        return map[err.code] || err.message;
      }

      // Login form
      document.getElementById('login-form')?.addEventListener('submit', async e => {
        e.preventDefault();
        const un = document.getElementById('login-username').value.trim();
        const pw = document.getElementById('login-password').value;
        const errEl = document.getElementById('login-error');
        const btn = document.getElementById('login-submit-btn');
        errEl.classList.add('hidden');
        btn.disabled = true; btn.textContent = '로그인 중...';
        try {
          const user = await loginUser(un, pw);
          showToast(`환영합니다, ${user.displayName}님!`, 'success');
        } catch (err) { errEl.textContent = authErrMsg(err); errEl.classList.remove('hidden'); }
        finally { btn.disabled = false; btn.textContent = '로그인'; }
      });

      // Firebase Auth 상태 리스너 연동
      onAuthStateChanged(auth, async (user) => {
        if (user) {
          try {
            const userDocRef = doc(db, 'users', user.uid);
            let userDocSnap = await getDoc(userDocRef);

            // 최초 주관리자 계정(admin@youthnaroo.local) 초기화 폴백
            if (!userDocSnap.exists() && user.email === 'admin@youthnaroo.local') {
              const initialAdmin = {
                username: 'admin',
                displayName: '시스템관리자',
                role: 'superadmin',
                allowedTeams: [],
                isActive: true,
                createdAt: serverTimestamp(),
                createdBy: 'system'
              };
              await setDoc(userDocRef, initialAdmin);
              userDocSnap = await getDoc(userDocRef);
            }

            if (userDocSnap.exists() && userDocSnap.data().isActive) {
              const userData = userDocSnap.data();
              if (userData.role !== 'admin' && userData.role !== 'superadmin') {
                // signOut을 호출하지 않음: 같은 브라우저 다른 탭(index.html)의 일반 유저 세션에 영향을 주지 않기 위해
                currentUser = null;
                updateHeader();
                showModal('login-modal');
                return;
              }

              currentUser = {
                id: user.uid,
                username: userData.username,
                displayName: userData.displayName,
                role: userData.role,
                allowedTeams: userData.allowedTeams || []
              };

              hideModal('login-modal');
              await loadTeams();
              updateHeader();
              setActiveTab('dashboard');
            } else {
              currentUser = null;
              updateHeader();
              showModal('login-modal');
            }
          } catch (e) {
            console.error('인증 정보 로드 에러:', e);
            currentUser = null;
            updateHeader();
            showModal('login-modal');
          }
        } else {
          currentUser = null;
          updateHeader();
          showModal('login-modal');
        }
      });

      // User modal form
      document.getElementById('user-form')?.addEventListener('submit', async e => {
        e.preventDefault();
        const btn = e.target.querySelector('[type=submit]');
        btn.disabled = true; btn.textContent = '저장 중...';
        try {
          const uid = document.getElementById('user-id-field').value;
          const isEdit = !!uid;
          const username = document.getElementById('user-username').value.trim();
          const displayName = document.getElementById('user-displayname').value.trim();
          const password = document.getElementById('user-password').value;
          const role = document.getElementById('user-role').value;
          const isActive = document.getElementById('user-is-active').checked;
          const allowedTeams = Array.from(document.querySelectorAll('[name=allowedTeams]:checked')).map(c => c.value);
          if (!displayName || (!isEdit && !password)) throw new Error('필수 항목을 모두 입력해주세요.');
          if (isEdit && password && password.length < 6) throw new Error('비밀번호는 6자 이상이어야 합니다.');
          let photoUrl = undefined;
          const photoFile = document.getElementById('user-photo-file')?.files?.[0];
          if (photoFile) {
            const statusEl = document.getElementById('user-photo-status');
            if (statusEl) statusEl.textContent = '이미지 압축 중...';
            photoUrl = await compressImageToBase64(photoFile);
          }
          if (isEdit) {
            const users = await loadUsers(); const old = users.find(u => u.id === uid);
            await updateUser(uid, { displayName, newPassword: password, role, allowedTeams, isActive, photoUrl }, old);
            showToast(`사용자가 수정되었습니다.${password ? ' (비밀번호 변경은 다음 로그인 시 적용)' : ''}`, 'success');
          } else {
            await createUser({ username, displayName, password, role, allowedTeams, isActive, photoUrl });
            showToast('사용자가 추가되었습니다.', 'success');
          }
          hideModal('user-modal'); await renderUsers();
        } catch (err) { showToast(err.message, 'error'); }
        finally { btn.disabled = false; btn.textContent = '저장'; }
      });

      // Role change → toggle team checkboxes
      document.getElementById('user-role')?.addEventListener('change', e => {
        const tc = document.getElementById('user-teams-section');
        if (tc) tc.classList.toggle('hidden', e.target.value !== 'user');
      });

      // User photo preview
      document.getElementById('user-photo-file')?.addEventListener('change', async e => {
        const file = e.target.files?.[0]; if (!file) return;
        const statusEl = document.getElementById('user-photo-status');
        const previewEl = document.getElementById('user-photo-preview');
        if (statusEl) statusEl.textContent = '압축 중...';
        try {
          const dataUrl = await compressImageToBase64(file);
          if (previewEl) previewEl.innerHTML = `<img src="${dataUrl}" class="w-full h-full object-cover">`;
          if (statusEl) statusEl.textContent = '준비됨';
        } catch { if (statusEl) statusEl.textContent = '오류 발생'; }
      });

      // Team leader search
      document.getElementById('team-leader-search')?.addEventListener('input', e => {
        const q = e.target.value.trim().toLowerCase();
        const dropdown = document.getElementById('team-leader-dropdown');
        if (!q) { dropdown.classList.add('hidden'); return; }
        const filtered = teamLeaderUsers.filter(u =>
          !teamLeaderIds.includes(u.id) &&
          ((u.displayName || '').toLowerCase().includes(q) || (u.username || '').toLowerCase().includes(q))
        );
        dropdown.innerHTML = filtered.length
          ? filtered.map(u => `<button type="button" data-uid="${esc(u.id)}" class="w-full text-left px-3 py-2 text-sm hover:bg-indigo-50 flex items-center gap-2 transition-colors">
              <span class="font-medium text-slate-700">${esc(u.displayName || u.username)}</span>
              <span class="text-xs text-slate-400">@${esc(u.username)}</span>
            </button>`).join('')
          : '<p class="text-xs text-slate-400 p-3 text-center">검색 결과 없음</p>';
        dropdown.classList.remove('hidden');
      });

      document.getElementById('team-leader-dropdown')?.addEventListener('click', e => {
        const btn = e.target.closest('[data-uid]');
        if (!btn) return;
        const uid = btn.getAttribute('data-uid');
        if (!teamLeaderIds.includes(uid)) { teamLeaderIds.push(uid); renderLeaderChips(); }
        document.getElementById('team-leader-search').value = '';
        document.getElementById('team-leader-dropdown').classList.add('hidden');
      });

      document.addEventListener('click', e => {
        if (!e.target.closest('#team-leader-search') && !e.target.closest('#team-leader-dropdown')) {
          document.getElementById('team-leader-dropdown')?.classList.add('hidden');
        }
      });

      // Team modal form
      document.getElementById('team-form')?.addEventListener('submit', async e => {
        e.preventDefault();
        const btn = e.target.querySelector('[type=submit]');
        btn.disabled = true; btn.textContent = '저장 중...';
        try {
          const tid = document.getElementById('team-id-field').value;
          const isEdit = !!tid;
          const id = isEdit ? tid : document.getElementById('team-id').value.trim();
          const name = document.getElementById('team-name').value.trim();
          const shortName = document.getElementById('team-shortname').value.trim();
          const fullType = document.getElementById('team-fulltype').value.trim();
          const schedule = document.getElementById('team-schedule').value.trim();
          const typicalRooms = document.getElementById('team-rooms').value.split(',').map(s => s.trim()).filter(Boolean);
          const colorKey = document.getElementById('team-color').value;
          const col = COLOR_OPTIONS.find(c => c.key === colorKey) || COLOR_OPTIONS[0];
          const leaderIds = [...teamLeaderIds];
          const slackWebhookUrl = document.getElementById('team-slack-url')?.value.trim() || '';
          if (!id || !name) throw new Error('ID와 이름은 필수입니다.');
          const data = { id, name, shortName, fullType, schedule, typicalRooms, bg: col.bg, text: col.text, border: col.border, leaderIds, slackWebhookUrl };
          if (isEdit) { const old = TEAMS.find(t => t.id === tid); await updateTeam(tid, data, old); showToast('활동단이 수정되었습니다.', 'success'); }
          else { await createTeam(data); showToast('활동단이 추가되었습니다.', 'success'); }
          hideModal('team-modal'); renderTeams();
        } catch (err) { showToast(err.message, 'error'); }
        finally { btn.disabled = false; btn.textContent = '저장'; }
      });

      // Close modals
      document.getElementById('close-user-modal')?.addEventListener('click', () => hideModal('user-modal'));
      document.getElementById('close-team-modal')?.addEventListener('click', () => hideModal('team-modal'));
      document.getElementById('close-contrib-modal')?.addEventListener('click', () => hideModal('contributor-modal'));
      document.getElementById('contributor-modal')?.addEventListener('click', e => { if (e.target === document.getElementById('contributor-modal')) hideModal('contributor-modal'); });

      // Contributor form submit
      document.getElementById('contrib-form')?.addEventListener('submit', async e => {
        e.preventDefault();
        const btn = e.target.querySelector('[type=submit]');
        btn.disabled = true; btn.textContent = '저장 중...';
        try {
          const id = document.getElementById('contrib-id-field').value;
          const name = document.getElementById('contrib-name').value.trim();
          const role = document.getElementById('contrib-role').value.trim();
          let photoUrl = document.getElementById('contrib-photo').value.trim();
          const order = parseInt(document.getElementById('contrib-order').value) || 99;
          if (!name) throw new Error('이름을 입력하세요.');

          const fileInput = document.getElementById('contrib-photo-file');
          if (fileInput?.files[0]) {
            const statusEl = document.getElementById('contrib-upload-status');
            if (statusEl) { statusEl.textContent = '압축 중...'; statusEl.className = 'text-[10px] text-teal-600 mt-1'; }
            try {
              photoUrl = await compressImageToBase64(fileInput.files[0]);
              if (statusEl) { statusEl.textContent = '변환 완료 ✓'; statusEl.className = 'text-[10px] text-teal-600 mt-1'; }
            } catch (err) {
              if (statusEl) { statusEl.textContent = '이미지 처리 실패'; statusEl.className = 'text-[10px] text-red-500 mt-1'; }
              if (!photoUrl) throw new Error('이미지 처리에 실패했습니다.');
            }
          }

          const data = { name, role, photoUrl, order };
          if (id) {
            await setDoc(doc(db, 'contributors', id), { ...data, updatedAt: serverTimestamp() }, { merge: true });
            showToast('기여자가 수정되었습니다.', 'success');
          } else {
            await addDoc(collection(db, 'contributors'), { ...data, createdAt: serverTimestamp() });
            showToast('기여자가 추가되었습니다.', 'success');
          }
          hideModal('contributor-modal');
          await renderContributors();
        } catch(err) { showToast(err.message, 'error'); }
        finally { btn.disabled = false; btn.textContent = '저장'; }
      });

      // Contributor photo file preview
      document.getElementById('contrib-photo-file')?.addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;
        const preview = document.getElementById('contrib-photo-preview');
        if (preview) { preview.src = URL.createObjectURL(file); preview.classList.remove('hidden'); }
        const statusEl = document.getElementById('contrib-upload-status');
        if (statusEl) { statusEl.textContent = `선택됨: ${file.name}`; statusEl.className = 'text-[10px] text-teal-600 mt-1'; }
      });
    }

    function updateHeader() {
      const el = document.getElementById('header-user');
      if (!el) return;
      if (!currentUser) { el.innerHTML = ''; return; }
      const roleLabel = { superadmin: '👑 주관리자', admin: '🔧 관리자', user: '👤' }[currentUser.role] || '';
      const name = currentUser.displayName || currentUser.username || '관리자';
      const firstChar = name ? name[0] : '관';
      el.innerHTML = `<div class="flex items-center gap-2">
    <div class="text-right hidden sm:block"><div class="text-xs font-bold text-slate-700">${esc(name)}</div><div class="text-[10px] text-slate-400">${roleLabel}</div></div>
    <div class="bg-gradient-to-br from-teal-400 to-teal-600 text-white rounded-full w-8 h-8 flex items-center justify-center text-sm font-bold">${esc(firstChar)}</div>
    <button id="logout-btn" class="ml-1 text-slate-400 hover:text-red-500 transition-colors p-1.5 rounded-lg hover:bg-red-50"><i data-lucide="log-out" class="w-4 h-4"></i></button>
  </div>`;
      document.getElementById('logout-btn')?.addEventListener('click', doLogout);
      lucide.createIcons();
    }

    // Helper for isAdminOrSuper check in login
    function isAdminOrSuperForRole(role) { return role === 'admin' || role === 'superadmin'; }

    // Expose functions to window for dynamic HTML inline onclick handlers
    window.hideModal = hideModal;
    window.showModal = showModal;
    window.setActiveTab = setActiveTab;
    window.renderLoginLogs = renderLoginLogs;
    window.renderActivityLogs = renderActivityLogs;

    if (document.readyState === 'loading') {
      window.addEventListener('DOMContentLoaded', initApp);
    } else {
      initApp();
    }
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap');

      box-sizing: border-box;

      font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;

        <div>
          <h1 class="text-xs md:text-sm font-black tracking-tight">유스나루 관리자 페이지</h1>
          <p class="text-[9px] text-slate-400 hidden sm:block">Admin Panel v2.0</p>
        </div>
      </div>
      <div class="flex items-center gap-2 md:gap-3">

      </div>

  </header>

  <!-- Layout -->
  <div class="flex flex-grow max-w-[1600px] w-full mx-auto p-4 gap-4">

    <!-- Sidebar -->
    <aside class="w-56 flex-shrink-0 hidden md:block">
      <nav class="bg-slate-900 rounded-2xl p-2 shadow-xl sticky top-4 space-y-1">
        <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest px-3 pt-2 pb-1">메뉴</p>
        <button data-tab="dashboard"
          class="w-full text-left flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-sm font-semibold text-slate-400 hover:bg-slate-700 hover:text-white transition-all">
          <i data-lucide="layout-dashboard" class="w-4 h-4 flex-shrink-0"></i> 대시보드
        </button>
        <button data-tab="users"
          class="w-full text-left flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-sm font-semibold text-slate-400 hover:bg-slate-700 hover:text-white transition-all">
          <i data-lucide="users" class="w-4 h-4 flex-shrink-0"></i> 사용자 관리
        </button>
        <button data-tab="teams"
          class="w-full text-left flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-sm font-semibold text-slate-400 hover:bg-slate-700 hover:text-white transition-all">
          <i data-lucide="flag" class="w-4 h-4 flex-shrink-0"></i> 활동단 관리
        </button>
        <div class="border-t border-slate-800 my-2"></div>
        <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest px-3 pb-1">로그</p>
        <button data-tab="login-logs"
          class="w-full text-left flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-sm font-semibold text-slate-400 hover:bg-slate-700 hover:text-white transition-all">
          <i data-lucide="log-in" class="w-4 h-4 flex-shrink-0"></i> 로그인 로그
        </button>
        <button data-tab="activity-logs"
          class="w-full text-left flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-sm font-semibold text-slate-400 hover:bg-slate-700 hover:text-white transition-all">
          <i data-lucide="activity" class="w-4 h-4 flex-shrink-0"></i> 활동 로그
        </button>
        <div class="border-t border-slate-800 my-2"></div>
        <button data-tab="archive"
          class="w-full text-left flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-sm font-semibold text-slate-400 hover:bg-slate-700 hover:text-white transition-all">
          <i data-lucide="history" class="w-4 h-4 flex-shrink-0"></i> 과거 기록
        </button>
        <div class="border-t border-slate-800 my-2"></div>
        <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest px-3 pb-1">설정</p>
        <button data-tab="sheets"
          class="w-full text-left flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-sm font-semibold text-slate-400 hover:bg-slate-700 hover:text-white transition-all">
          <i data-lucide="file-spreadsheet" class="w-4 h-4 flex-shrink-0"></i> 구글 시트 연동
        </button>
        <button data-tab="invite-codes"
          class="w-full text-left flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-sm font-semibold text-slate-400 hover:bg-slate-700 hover:text-white transition-all">
          <i data-lucide="ticket" class="w-4 h-4 flex-shrink-0"></i> 초대코드
        </button>
        <button data-tab="contributors"
          class="w-full text-left flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-sm font-semibold text-slate-400 hover:bg-slate-700 hover:text-white transition-all">
          <i data-lucide="heart" class="w-4 h-4 flex-shrink-0"></i> 기여자 관리
        </button>
      </nav>
    </aside>

    <!-- Mobile Tab Bar -->
    <div class="md:hidden w-full fixed bottom-0 left-0 right-0 z-40 bg-slate-900 border-t border-slate-800 flex">
      <button data-tab="dashboard"
        class="flex-1 flex flex-col items-center gap-1 py-2 text-slate-400 text-[9px] font-bold"><i
          data-lucide="layout-dashboard" class="w-4 h-4"></i>대시보드</button>
      <button data-tab="users"
        class="flex-1 flex flex-col items-center gap-1 py-2 text-slate-400 text-[9px] font-bold"><i data-lucide="users"
          class="w-4 h-4"></i>사용자</button>
      <button data-tab="teams"
        class="flex-1 flex flex-col items-center gap-1 py-2 text-slate-400 text-[9px] font-bold"><i data-lucide="flag"
          class="w-4 h-4"></i>활동단</button>
      <button data-tab="login-logs"
        class="flex-1 flex flex-col items-center gap-1 py-2 text-slate-400 text-[9px] font-bold"><i data-lucide="log-in"
          class="w-4 h-4"></i>로그인</button>
      <button data-tab="activity-logs"
        class="flex-1 flex flex-col items-center gap-1 py-2 text-slate-400 text-[9px] font-bold"><i
          data-lucide="activity" class="w-4 h-4"></i>활동</button>
      <button data-tab="sheets"
        class="flex-1 flex flex-col items-center gap-1 py-2 text-slate-400 text-[9px] font-bold"><i
          data-lucide="file-spreadsheet" class="w-4 h-4"></i>시트연동</button>
      <button data-tab="invite-codes"
        class="flex-1 flex flex-col items-center gap-1 py-2 text-slate-400 text-[9px] font-bold"><i
          data-lucide="ticket" class="w-4 h-4"></i>초대코드</button>
      <button data-tab="contributors"
        class="flex-1 flex flex-col items-center gap-1 py-2 text-slate-400 text-[9px] font-bold"><i
          data-lucide="heart" class="w-4 h-4"></i>기여자</button>
    </div>

    <!-- Main Content -->
    <main class="flex-grow min-w-0 pb-20 md:pb-0">
      <div data-panel="dashboard" id="panel-dashboard"></div>
      <div data-panel="users" id="panel-users" class="hidden"></div>
      <div data-panel="teams" id="panel-teams" class="hidden"></div>
      <div data-panel="login-logs" id="panel-login-logs" class="hidden"></div>
      <div data-panel="activity-logs" id="panel-activity-logs" class="hidden"></div>
      <div data-panel="archive" id="panel-archive" class="hidden"></div>
      <div data-panel="sheets" id="panel-sheets" class="hidden"></div>
      <div data-panel="invite-codes" id="panel-invite-codes" class="hidden"></div>
      <div data-panel="contributors" id="panel-contributors" class="hidden"></div>
    </main>
  </div>

  <!-- Toast -->
  <div id="toast"
    class="fixed bottom-20 md:bottom-6 left-1/2 z-[200] flex items-center gap-2 bg-emerald-600 text-white px-5 py-3 rounded-2xl shadow-2xl text-sm font-semibold pointer-events-none"
    style="opacity:0;transform:translateX(-50%) translateY(16px);transition:all .3s">
    <i data-lucide="check-circle" class="w-4 h-4"></i>
    <span id="toast-msg">알림</span>
  </div>

  <!-- ===== LOGIN MODAL ===== -->
  <div id="login-modal"
    class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm border border-slate-200 overflow-hidden">
      <div class="bg-gradient-to-br from-slate-800 to-slate-900 p-6 text-white">
        <div class="flex items-center gap-3">
          <div class="bg-teal-500/20 p-2 rounded-xl border border-teal-500/30"><i data-lucide="shield"
              class="w-5 h-5 text-teal-400"></i></div>
          <div>
            <h2 class="text-base font-bold">관리자 로그인</h2>
            <p class="text-xs text-slate-400">관리자 계정으로 로그인하세요</p>
          </div>
        </div>
      </div>
      <div class="p-6">
        <form id="login-form" class="flex flex-col gap-4">
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1.5">아이디</label>
            <input id="login-username" type="text" placeholder="아이디" required autocomplete="username"
              class="w-full px-3 py-2.5 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-400 placeholder-slate-300">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1.5">비밀번호</label>
            <input id="login-password" type="password" placeholder="비밀번호" required autocomplete="current-password"
              class="w-full px-3 py-2.5 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-400 placeholder-slate-300">
          </div>
          <div id="login-error"
            class="hidden bg-red-50 border border-red-200 text-red-600 text-xs px-3 py-2 rounded-xl"></div>

          <button id="login-submit-btn" type="submit"
            class="w-full bg-gradient-to-r from-slate-700 to-slate-800 hover:from-slate-800 hover:to-slate-900 text-white font-bold py-3 rounded-xl transition-all text-sm">
            로그인
          </button>
          <a href="index.html" class="text-center text-xs text-slate-400 hover:text-teal-600 transition-colors">← 일반 예약
            페이지로</a>
        </form>
      </div>
    </div>
  </div>

  <!-- ===== USER MODAL ===== -->
  <div id="user-modal"
    class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md border border-slate-200 max-h-[90vh] overflow-y-auto">
      <div class="flex items-center justify-between p-5 border-b border-slate-100">
        <div class="flex items-center gap-3">
          <div class="bg-teal-100 text-teal-600 p-2 rounded-xl"><i data-lucide="user-plus" class="w-4 h-4"></i></div>
          <h2 id="user-modal-title" class="font-bold text-slate-800">사용자 추가</h2>
        </div>
        <button id="close-user-modal" class="text-slate-400 hover:text-slate-600 p-1 rounded-lg hover:bg-slate-100">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <form id="user-form" class="p-5 flex flex-col gap-4">
        <input type="hidden" id="user-id-field">
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1.5">아이디 <span
                class="text-red-400">*</span></label>
            <input id="user-username" type="text" required placeholder="영문/숫자"
              class="w-full px-3 py-2 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-400 placeholder-slate-300 disabled:bg-slate-50 disabled:text-slate-400">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1.5">이름 <span
                class="text-red-400">*</span></label>
            <input id="user-displayname" type="text" required placeholder="표시 이름"
              class="w-full px-3 py-2 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-400 placeholder-slate-300">
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1.5">비밀번호</label>
          <input id="user-password" type="password" placeholder="비밀번호"
            class="w-full px-3 py-2 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-400 placeholder-slate-300">
          <p id="user-password-tip" class="text-[10px] text-amber-600 mt-1.5 hidden">💡 타인의 비밀번호는 보안상 Firebase Console에서만 직접 재설정할 수 있습니다.</p>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1.5">역할</label>
            <select id="user-role"
              class="w-full px-3 py-2 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-400 bg-white">
              <option value="user">👤 일반사용자</option>
              <option value="admin">🔧 관리자</option>
              <option value="superadmin" id="superadmin-opt">👑 주관리자</option>
            </select>
          </div>
          <div class="flex items-end pb-2">
            <label class="flex items-center gap-2 cursor-pointer">
              <input id="user-is-active" type="checkbox" checked class="rounded accent-teal-600 w-4 h-4">
              <span class="text-sm font-semibold text-slate-700">활성 계정</span>
            </label>
          </div>
        </div>
        <div id="user-teams-section">
          <label class="block text-xs font-semibold text-slate-600 mb-2">활동단 권한 <span
              class="text-slate-400 font-normal">(일반사용자 한정)</span></label>
          <div id="user-teams-cb"
            class="grid grid-cols-2 gap-1 max-h-48 overflow-y-auto p-1 border border-slate-100 rounded-xl bg-slate-50">
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1.5">프로필 사진</label>
          <div class="flex items-center gap-3">
            <div id="user-photo-preview" class="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center overflow-hidden border border-slate-200 shrink-0">
              <i data-lucide="user" class="w-6 h-6 text-slate-300"></i>
            </div>
            <div class="flex-1">
              <label class="flex items-center gap-2 cursor-pointer px-3 py-2 text-xs text-slate-600 border border-slate-200 rounded-xl hover:bg-slate-50 transition">
                <i data-lucide="upload" class="w-3.5 h-3.5"></i>
                <span>이미지 선택 (자동 압축)</span>
                <input type="file" id="user-photo-file" accept="image/*" class="hidden">
              </label>
              <p id="user-photo-status" class="text-[10px] text-slate-400 mt-1"></p>
            </div>
          </div>
        </div>
        <button type="submit"
          class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-2.5 rounded-xl transition-all text-sm shadow-sm">저장</button>
      </form>
    </div>
  </div>

  <!-- ===== TEAM MODAL ===== -->
  <div id="team-modal"
    class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md border border-slate-200">
      <div class="flex items-center justify-between p-5 border-b border-slate-100">
        <div class="flex items-center gap-3">
          <div class="bg-indigo-100 text-indigo-600 p-2 rounded-xl"><i data-lucide="flag" class="w-4 h-4"></i></div>
          <h2 id="team-modal-title" class="font-bold text-slate-800">활동단 추가</h2>
        </div>
        <button id="close-team-modal" class="text-slate-400 hover:text-slate-600 p-1 rounded-lg hover:bg-slate-100">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <form id="team-form" class="p-5 flex flex-col gap-3">
        <input type="hidden" id="team-id-field">
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1.5">ID <span
                class="text-red-400">*</span></label>
            <input id="team-id" type="text" required placeholder="영문 소문자"
              class="w-full px-3 py-2 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 placeholder-slate-300 disabled:bg-slate-50 disabled:text-slate-400">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1.5">활동단명 <span
                class="text-red-400">*</span></label>
            <input id="team-name" type="text" required placeholder="이름"
              class="w-full px-3 py-2 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 placeholder-slate-300">
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1.5">정식명칭</label>
            <input id="team-fulltype" type="text" placeholder="예: YNBC 대학생미디어"
              class="w-full px-3 py-2 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 placeholder-slate-300">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1.5">활동단 약어 <span class="text-slate-400 font-normal">(예약표 노출용)</span></label>
            <input id="team-shortname" type="text" placeholder="예: 대학생미디어 ➡️ 대미"
              class="w-full px-3 py-2 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 placeholder-slate-300">
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1.5">정기 일정</label>
          <input id="team-schedule" type="text" placeholder="예: 2,4주 토요일 14:00~17:00"
            class="w-full px-3 py-2 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 placeholder-slate-300">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1.5">주요 공간 <span
              class="text-slate-400 font-normal">(쉼표 구분)</span></label>
          <input id="team-rooms" type="text" placeholder="예: 나루지기, 링키"
            class="w-full px-3 py-2 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 placeholder-slate-300">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1.5">색상</label>
          <select id="team-color"
            class="w-full px-3 py-2 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white"></select>
        </div>
        <div class="border-t border-slate-100 pt-3 space-y-3">
          <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">알림 설정</p>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1.5">담당자 <span class="text-slate-400 font-normal">(예약 변경 시 인앱 알림 · 복수 선택 가능)</span></label>
            <div id="team-leaders-selected" class="flex flex-wrap gap-1 mb-2"></div>
            <div class="relative">
              <input id="team-leader-search" type="text" placeholder="이름으로 검색 후 선택..." autocomplete="off"
                class="w-full px-3 py-2 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 placeholder-slate-300">
              <div id="team-leader-dropdown" class="hidden absolute z-20 w-full mt-1 bg-white border border-slate-200 rounded-xl shadow-lg max-h-40 overflow-y-auto"></div>
            </div>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1.5">슬랙 웹훅 URL <span class="text-slate-400 font-normal">(선택)</span></label>
            <input id="team-slack-url" type="url" placeholder="https://hooks.slack.com/services/..."
              class="w-full px-3 py-2 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 placeholder-slate-300">
          </div>
        </div>
        <button type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-xl transition-all text-sm shadow-sm mt-1">저장</button>
      </form>
    </div>
  </div>

  <!-- CONTRIBUTOR MODAL -->
  <div id="contributor-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm border border-slate-200 overflow-hidden">
      <div class="flex items-center justify-between p-5 border-b border-slate-100">
        <h2 id="contrib-modal-title" class="font-bold text-slate-800">기여자 추가</h2>
        <button id="close-contrib-modal" class="text-slate-400 hover:text-slate-600 p-1 rounded-lg hover:bg-slate-100"><i data-lucide="x" class="w-5 h-5"></i></button>
      </div>
      <form id="contrib-form" class="p-5 flex flex-col gap-3">
        <input type="hidden" id="contrib-id-field">
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1.5">이름 *</label>
          <input id="contrib-name" type="text" required placeholder="홍길동" class="w-full px-3 py-2 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-400">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1.5">역할 / 소개</label>
          <input id="contrib-role" type="text" placeholder="예: 웹 개발, 디자인" class="w-full px-3 py-2 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-400">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1.5">사진 업로드 / URL</label>
          <div class="flex items-center gap-3 mb-2">
            <img id="contrib-photo-preview" src="" onerror="this.classList.add('hidden')" class="w-14 h-14 rounded-full object-cover border-2 border-slate-200 hidden shrink-0">
            <div class="flex-1 min-w-0">
              <input id="contrib-photo-file" type="file" accept="image/*"
                class="w-full text-xs text-slate-600 file:mr-2 file:py-1 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-teal-50 file:text-teal-700 hover:file:bg-teal-100 cursor-pointer">
              <p id="contrib-upload-status" class="text-[10px] text-slate-400 mt-1">이미지 파일 선택 (용량 무관, 자동 압축)</p>
            </div>
          </div>
          <input id="contrib-photo" type="url" placeholder="또는 URL 직접 입력 (https://...)" class="w-full px-3 py-2 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-400">
          <p class="text-[10px] text-slate-400 mt-1">파일 업로드 우선 적용 · 비워두면 이니셜 표시</p>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1.5">순서 (숫자, 낮을수록 앞)</label>
          <input id="contrib-order" type="number" value="99" min="0" class="w-full px-3 py-2 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-400">
        </div>
        <button type="submit" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-2.5 rounded-xl transition-all text-sm mt-1">저장</button>
      </form>
    </div>
  </div>

  <!-- CONFIRM MODAL -->
  <div id="confirm-modal" class="hidden fixed inset-0 z-[999] flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" id="confirm-modal-backdrop"></div>
    <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-xs border border-slate-100 overflow-hidden">
      <div id="confirm-modal-header" class="h-1.5 w-full bg-amber-400"></div>
      <div class="p-6">
        <div class="flex items-start gap-3 mb-4">
          <div class="w-10 h-10 rounded-full bg-amber-50 flex items-center justify-center shrink-0">
            <i data-lucide="alert-triangle" class="w-5 h-5 text-amber-500"></i>
          </div>
          <div>
            <h3 id="confirm-modal-title" class="text-sm font-bold text-slate-800 mb-1">확인</h3>
            <p id="confirm-modal-msg" class="text-xs text-slate-500 leading-relaxed whitespace-pre-line"></p>
          </div>
        </div>
        <div class="flex gap-2">
          <button id="confirm-modal-cancel" class="flex-1 py-2.5 rounded-xl text-sm font-bold bg-slate-100 text-slate-600 hover:bg-slate-200 transition-colors">취소</button>
          <button id="confirm-modal-ok" class="flex-1 py-2.5 rounded-xl text-sm font-bold text-white bg-teal-600 hover:bg-teal-700 transition-colors">확인</button>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
